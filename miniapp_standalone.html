<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Тренажёр госэкзамена</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>

  /* ====== Базовые стили ====== */
  :root {
    --bg: #0f1419;
    --bg-elevated: #1a1f29;
    --bg-card: #232a37;
    --border: #2f3744;
    --border-strong: #3f4a5c;
    --text: #e6eaf2;
    --text-dim: #8b95a8;
    --text-muted: #5f6776;
    --accent: #6ba4ff;
    --accent-hover: #8bb8ff;
    --correct: #2ecc71;
    --correct-bg: rgba(46, 204, 113, 0.12);
    --wrong: #e74c3c;
    --wrong-bg: rgba(231, 76, 60, 0.12);
    --warn: #f1c40f;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }

  /* ====== Шапка ====== */
  header.top {
    border-bottom: 1px solid var(--border);
    background: var(--bg-elevated);
    position: sticky;
    top: 0;
    z-index: 50;
    backdrop-filter: blur(10px);
  }
  .top-inner {
    max-width: 900px;
    margin: 0 auto;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    justify-content: space-between;
  }
  .top-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin: 0;
    cursor: pointer;
    user-select: none;
  }
  .top-title:hover { color: var(--accent); }
  .top-meta {
    font-size: 13px;
    color: var(--text-dim);
  }

  /* ====== Кнопки ====== */
  button, .btn {
    font-family: inherit;
    font-size: 14px;
    border: 1px solid var(--border-strong);
    background: var(--bg-card);
    color: var(--text);
    padding: 10px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s ease;
    font-weight: 500;
  }
  button:hover, .btn:hover {
    background: var(--bg-elevated);
    border-color: var(--accent);
  }
  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #0f1419;
    font-weight: 600;
  }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .btn-ghost {
    background: transparent;
    border-color: transparent;
    color: var(--text-dim);
  }
  .btn-ghost:hover { background: var(--bg-card); color: var(--text); border-color: var(--border); }
  .btn-danger {
    border-color: var(--wrong);
    color: var(--wrong);
  }
  .btn-danger:hover { background: var(--wrong-bg); }

  /* ====== Главное меню ====== */
  .mode-grid {
    display: grid;
    gap: 14px;
    grid-template-columns: 1fr;
    margin-top: 24px;
  }
  @media (min-width: 640px) { .mode-grid { grid-template-columns: 1fr 1fr; } }

  .mode-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: left;
    width: 100%;
    color: var(--text);
  }
  .mode-card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: var(--shadow);
  }
  .mode-card-icon {
    font-size: 24px;
    margin-bottom: 8px;
  }
  .mode-card-title {
    font-weight: 600;
    font-size: 16px;
    margin-bottom: 6px;
  }
  .mode-card-desc {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.45;
  }

  /* ====== Общая статистика ====== */
  .stats-bar {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin: 20px 0;
    padding: 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .stat-item {
    flex: 1;
    min-width: 100px;
  }
  .stat-value {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
  }
  .stat-value.correct { color: var(--correct); }
  .stat-value.wrong { color: var(--wrong); }
  .stat-label {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  h2 {
    font-size: 18px;
    font-weight: 600;
    margin: 28px 0 12px;
    color: var(--text);
  }

  /* ====== Список разделов/тем ====== */
  .topic-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .section-block {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .section-header {
    padding: 14px 18px;
    font-weight: 600;
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border);
    font-size: 15px;
  }
  .topic-row {
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    gap: 12px;
    transition: background 0.12s;
  }
  .topic-row:last-child { border-bottom: none; }
  .topic-row:hover { background: var(--bg-elevated); }
  .topic-title {
    flex: 1;
    min-width: 0;
  }
  .topic-name {
    font-size: 14px;
    color: var(--text);
  }
  .topic-meta {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .topic-progress {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .topic-progress .pct {
    font-weight: 600;
    color: var(--text);
  }

  /* ====== Прогресс-бар ====== */
  .progress {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 8px;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s ease;
  }
  .progress-fill.correct { background: var(--correct); }

  /* ====== Карточка вопроса ====== */
  .question-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--text-dim);
    flex-wrap: wrap;
    gap: 8px;
  }
  .question-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
  }
  .question-tag {
    display: inline-block;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--border);
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-right: 6px;
    font-weight: 500;
  }
  .question-tag.calc { background: rgba(241, 196, 15, 0.2); color: var(--warn); }
  .question-tag.multi { background: rgba(107, 164, 255, 0.2); color: var(--accent); }
  .question-tag.seq { background: rgba(155, 89, 182, 0.2); color: #b67ed3; }
  .question-text {
    font-size: 16px;
    line-height: 1.55;
    margin-bottom: 18px;
    color: var(--text);
    white-space: pre-wrap;
  }
  .question-image {
    max-width: 100%;
    border-radius: 8px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
  }

  /* ====== Варианты ответов ====== */
  .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 14px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.12s;
    background: var(--bg-elevated);
    user-select: none;
  }
  .option:hover { border-color: var(--accent); }
  .option.selected { border-color: var(--accent); background: rgba(107, 164, 255, 0.08); }
  .option.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
  }
  .option.wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
  }
  .option.reveal-correct {
    border-color: var(--correct);
    background: var(--correct-bg);
  }
  .option-marker {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border-strong);
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .option-marker.square { border-radius: 4px; }
  .option.selected .option-marker { border-color: var(--accent); }
  .option.selected .option-marker::after {
    content: '';
    width: 10px;
    height: 10px;
    background: var(--accent);
    border-radius: 50%;
  }
  .option.selected .option-marker.square::after { border-radius: 2px; }
  .option.correct .option-marker, .option.reveal-correct .option-marker { border-color: var(--correct); }
  .option.correct .option-marker::after, .option.reveal-correct .option-marker::after {
    content: '✓';
    color: var(--correct);
    font-weight: 700;
    background: none;
    width: auto;
    height: auto;
    font-size: 14px;
    line-height: 1;
  }
  .option.wrong .option-marker { border-color: var(--wrong); }
  .option.wrong .option-marker::after {
    content: '✗';
    color: var(--wrong);
    font-weight: 700;
    background: none;
    width: auto;
    height: auto;
    font-size: 14px;
    line-height: 1;
  }
  .option-text { flex: 1; font-size: 14px; line-height: 1.5; }

  /* ====== Drag-and-drop для последовательностей ====== */
  .sequence-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .seq-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--bg-elevated);
    cursor: grab;
    transition: all 0.12s;
  }
  .seq-item:active { cursor: grabbing; }
  .seq-item.dragging { opacity: 0.5; }
  .seq-item.drag-over { border-color: var(--accent); }
  .seq-item.correct { border-color: var(--correct); background: var(--correct-bg); }
  .seq-item.wrong { border-color: var(--wrong); background: var(--wrong-bg); }
  .seq-handle { color: var(--text-muted); cursor: grab; font-size: 16px; }
  .seq-num {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .seq-text { flex: 1; font-size: 14px; }
  .seq-btn {
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    color: var(--text);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }
  .seq-btn:hover:not(:disabled) { background: var(--bg); border-color: var(--accent); }
  .seq-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ====== Feedback ====== */
  .feedback {
    margin-top: 16px;
    padding: 14px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    border: 1px solid;
  }
  .feedback.correct { background: var(--correct-bg); border-color: var(--correct); color: var(--correct); }
  .feedback.wrong { background: var(--wrong-bg); border-color: var(--wrong); color: var(--wrong); }
  .feedback strong { font-weight: 600; }
  .solution-block {
    margin-top: 12px;
    padding: 12px 14px;
    border-left: 3px solid var(--warn);
    background: rgba(241, 196, 15, 0.06);
    color: var(--text);
    font-size: 13px;
    line-height: 1.6;
    border-radius: 0 4px 4px 0;
  }
  .solution-block strong { color: var(--warn); }

  /* ====== Footer карточки (репорт + бейдж) ====== */
  .card-footer {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px dashed var(--border);
    flex-wrap: wrap;
  }
  .card-footer-spacer { flex: 1; }
  .btn-report {
    font-size: 12px;
    padding: 6px 12px;
    color: var(--text-dim);
  }
  .btn-report:hover { color: var(--warn); border-color: var(--warn); background: rgba(241, 196, 15, 0.06); }
  .edited-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(107, 164, 255, 0.12);
    color: var(--accent);
    font-weight: 500;
  }

  /* ====== Модальное окно редактора ====== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
    overflow-y: auto;
  }
  .modal {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 100%;
    max-width: 700px;
    padding: 24px;
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    gap: 12px;
  }
  .modal-title { font-size: 17px; font-weight: 600; margin: 0; }
  .modal-close {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 24px;
    line-height: 1;
    cursor: pointer;
    padding: 4px 8px;
  }
  .modal-close:hover { color: var(--text); background: var(--bg-card); border-color: transparent; }
  .modal-section {
    margin-bottom: 16px;
  }
  .modal-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .modal textarea, .modal input[type="text"] {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.5;
    resize: vertical;
  }
  .modal textarea { min-height: 70px; }
  .modal textarea:focus, .modal input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .editor-option {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    margin-bottom: 8px;
    padding: 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .editor-option.is-correct { border-color: var(--correct); background: var(--correct-bg); }
  .editor-option-toggle {
    background: transparent;
    border: 2px solid var(--border-strong);
    color: var(--text-dim);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    font-weight: 700;
    flex-shrink: 0;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .editor-option-toggle:hover { border-color: var(--correct); color: var(--correct); }
  .editor-option.is-correct .editor-option-toggle {
    border-color: var(--correct);
    color: var(--correct);
    background: rgba(46, 204, 113, 0.15);
  }
  .editor-option textarea { flex: 1; min-height: 50px; }
  .editor-option-remove {
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--text-dim);
    width: 32px;
    height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    flex-shrink: 0;
    padding: 0;
  }
  .editor-option-remove:hover { color: var(--wrong); border-color: var(--wrong); }
  .editor-add-opt {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--border-strong);
    color: var(--text-dim);
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .editor-add-opt:hover { border-color: var(--accent); color: var(--accent); }
  .editor-seq-item {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 6px;
    padding: 8px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .editor-seq-num {
    width: 28px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    flex-shrink: 0;
  }
  .editor-seq-item input { flex: 1; }
  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .modal-actions .spacer { flex: 1; }
  .modal-hint {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
    line-height: 1.5;
  }

  /* ====== Блок «Мои правки» на главной ====== */
  .patches-block {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-top: 12px;
  }
  .patches-info { margin-bottom: 12px; }
  .patches-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .patches-actions button { font-size: 13px; padding: 8px 12px; }

  /* ====== Навигация по тесту ====== */
  .nav-bar {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 16px;
  }
  .nav-bar .spacer { flex: 1; }
  .nav-counter {
    font-size: 13px;
    color: var(--text-dim);
    text-align: center;
  }

  /* ====== Результаты экзамена ====== */
  .result-banner {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    text-align: center;
    margin-bottom: 20px;
  }
  .result-score {
    font-size: 48px;
    font-weight: 700;
    margin: 8px 0;
  }
  .result-grade {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .grade-otl { color: var(--correct); }
  .grade-hor { color: #1abc9c; }
  .grade-udov { color: var(--warn); }
  .grade-neud { color: var(--wrong); }
  .result-detail {
    color: var(--text-dim);
    font-size: 14px;
  }

  /* ====== Палитра кнопок-вопросов в общем режиме ====== */
  .question-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(36px, 1fr));
    gap: 4px;
    margin: 16px 0;
    max-height: 200px;
    overflow-y: auto;
    padding: 4px;
    background: var(--bg-elevated);
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  .q-chip {
    aspect-ratio: 1;
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    background: var(--bg-card);
    color: var(--text-dim);
    cursor: pointer;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s;
  }
  .q-chip:hover { transform: scale(1.1); border-color: var(--accent); }
  .q-chip.current { border-color: var(--accent); color: var(--accent); font-weight: 700; }
  .q-chip.correct { background: var(--correct-bg); border-color: var(--correct); color: var(--correct); }
  .q-chip.wrong { background: var(--wrong-bg); border-color: var(--wrong); color: var(--wrong); }

  /* ====== Утилитарные классы ====== */
  .hidden { display: none !important; }
  .row { display: flex; align-items: center; gap: 12px; }
  .row.between { justify-content: space-between; }
  .muted { color: var(--text-dim); }
  .small { font-size: 12px; }

  /* Скроллбар */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

html, body { margin: 0; overscroll-behavior-y: none; }
::-webkit-scrollbar { width: 0; }
#tg-loader {
  position: fixed; inset: 0; z-index: 9999;
  background: #0f1419;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; color: #8b95a8; font-size: 14px;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  transition: opacity 0.4s;
}
.tg-spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(107,164,255,0.2);
  border-top-color: #6ba4ff;
  border-radius: 50%;
  animation: tgspin 0.8s linear infinite;
}
@keyframes tgspin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="tg-loader">
  <div class="tg-spinner"></div>
  <div id="tg-loader-text">Загружаем вопросы…</div>
</div>

<header class="top" id="main-header" style="visibility:hidden;">
  <div class="top-inner">
    <h1 class="top-title" onclick="App.goHome()">📚 Тренажёр ГОС</h1>
    <div class="top-meta" id="topMeta"></div>
  </div>
</header>

<main class="container" id="app" style="visibility:hidden;"></main>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const haptic = {
  light:   () => tg?.HapticFeedback?.impactOccurred('light'),
  success: () => tg?.HapticFeedback?.notificationOccurred('success'),
  error:   () => tg?.HapticFeedback?.notificationOccurred('error'),
};

function setBackBtn(show) {
  if (!tg?.BackButton) return;
  show ? tg.BackButton.show() : tg.BackButton.hide();
}

let QUESTIONS = [];

const QUESTIONS_URL = 'https://raw.githubusercontent.com/VladislavNoname/gosbot-/main/questions_miniapp.json';
const Q_CACHE_KEY = 'gosexam_q_cache_v1';
const Q_CACHE_TS  = 'gosexam_q_cache_ts';
const Q_CACHE_TTL = 30 * 60 * 1000;  // 30 мин кэш

function _rebuildIndex() {
  QUESTIONS_BY_ID = new Map(QUESTIONS.map(q => [q.id, q]));
}

async function loadQuestions() {
  try {
    const ts = parseInt(localStorage.getItem(Q_CACHE_TS) || '0');
    if (Date.now() - ts < Q_CACHE_TTL) {
      const cached = localStorage.getItem(Q_CACHE_KEY);
      if (cached) {
        QUESTIONS = JSON.parse(cached);
        _rebuildIndex();
        return;
      }
    }
  } catch(e) {}
  const r = await fetch(QUESTIONS_URL + '?t=' + Date.now());
  if (!r.ok) throw new Error('HTTP ' + r.status);
  QUESTIONS = await r.json();
  _rebuildIndex();
  try {
    localStorage.setItem(Q_CACHE_KEY, JSON.stringify(QUESTIONS));
    localStorage.setItem(Q_CACHE_TS, String(Date.now()));
  } catch(e) {}
}

const STORAGE_KEY = 'gosexam_progress_v1';

/* ---------- Загрузка вопросов ---------- */
// QUESTIONS loaded via fetch (see boot)

/* ---------- Хранение прогресса и правок ----------
   Структура:
   {
     answers: { [questionId]: { status, given, ts } },
     lastMode: { type, currentIndex, order: [ids] },
     overrides: { [questionId]: { text?, options?, sequence?, solution?, ts } }
   }
   overrides — пользовательские правки вопросов поверх исходного JSON.
*/
const Store = {
  data: { answers: {}, lastMode: null, overrides: {} },
  load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) this.data = JSON.parse(raw);
    } catch (e) { console.warn('Не удалось загрузить прогресс:', e); }
    if (!this.data.answers) this.data.answers = {};
    if (!this.data.overrides) this.data.overrides = {};
  },
  save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(this.data)); }
    catch (e) { console.warn('Не удалось сохранить прогресс:', e); }
  },
  recordAnswer(qid, status, given) {
    this.data.answers[qid] = { status, given, ts: Date.now() };
    this.save();
  },
  getAnswer(qid) { return this.data.answers[qid]; },
  resetAll() {
    this.data = { answers: {}, lastMode: null, overrides: this.data.overrides || {} };
    this.save();
  },
  resetSubset(ids) {
    for (const id of ids) delete this.data.answers[id];
    this.save();
  },
  setLastMode(mode) { this.data.lastMode = mode; this.save(); },
  clearLastMode() { this.data.lastMode = null; this.save(); },

  /* ---- Правки вопросов ---- */
  getOverride(qid) { return this.data.overrides[qid]; },
  setOverride(qid, patch) {
    this.data.overrides[qid] = Object.assign({}, patch, { ts: Date.now() });
    this.save();
  },
  removeOverride(qid) {
    delete this.data.overrides[qid];
    // Также сбросим сохранённый ответ — он мог стать невалидным после изменения правильного варианта
    delete this.data.answers[qid];
    this.save();
  },
  getAllOverrides() { return this.data.overrides; },
  countOverrides() { return Object.keys(this.data.overrides).length; },
  importOverrides(obj, mode = 'merge') {
    // mode: 'merge' — добавить к существующим, 'replace' — заменить все
    if (mode === 'replace') this.data.overrides = {};
    let added = 0;
    for (const [qid, patch] of Object.entries(obj || {})) {
      // Проверим, что вопрос существует
      if (QUESTIONS.find(q => String(q.id) === String(qid))) {
        this.data.overrides[qid] = Object.assign({}, patch, { ts: patch.ts || Date.now() });
        // Сбросим ответ при изменении вопроса
        delete this.data.answers[qid];
        added++;
      }
    }
    this.save();
    return added;
  },
};
Store.load();

/* ---------- Доступ к вопросам с учётом пользовательских правок ---------- */
let QUESTIONS_BY_ID = new Map(); // заполняется после loadQuestions()
// Возвращает «эффективную» версию вопроса: оригинал + применённый override
function getQuestion(id) {
  const base = QUESTIONS_BY_ID.get(id);
  if (!base) return null;
  const ov = Store.getOverride(id);
  if (!ov) return base;
  // Поверхностный клон + применение полей
  const merged = Object.assign({}, base);
  if (ov.text !== undefined) merged.text = ov.text;
  if (ov.options !== undefined) merged.options = ov.options;
  if (ov.sequence !== undefined) merged.sequence = ov.sequence;
  if (ov.solution !== undefined) merged.solution = ov.solution;
  merged._edited = true; // флаг для UI
  return merged;
}
function isEdited(id) { return !!Store.getOverride(id); }

/* ---------- Утилиты ---------- */
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function arraysEqual(a, b) {
  if (a.length !== b.length) return false;
  for (let i = 0; i < a.length; i++) if (a[i] !== b[i]) return false;
  return true;
}
function setsEqual(a, b) {
  if (a.size !== b.size) return false;
  for (const x of a) if (!b.has(x)) return false;
  return true;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'
  }[c]));
}
function pluralRu(n, one, few, many) {
  const m10 = Math.abs(n) % 10;
  const m100 = Math.abs(n) % 100;
  if (m10 === 1 && m100 !== 11) return one;
  if (m10 >= 2 && m10 <= 4 && (m100 < 12 || m100 > 14)) return few;
  return many;
}
function el(tag, props = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (v === null || v === undefined || v === false) continue; // не ставим атрибут вовсе
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'dataset') Object.assign(e.dataset, v);
    else if (k === 'disabled') e.disabled = true;        // булев атрибут — через свойство
    else if (k === 'draggable') e.setAttribute('draggable', v === true ? 'true' : String(v));
    else e.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}

/* ---------- Группировка вопросов ---------- */
function getSections() {
  const map = new Map();
  for (const q of QUESTIONS) {
    if (!map.has(q.section)) {
      map.set(q.section, {
        number: q.section,
        title: q.section_title,
        topics: new Map(),
        count: 0,
      });
    }
    const sec = map.get(q.section);
    sec.count++;
    const topicKey = q.topic || '_';
    if (!sec.topics.has(topicKey)) {
      sec.topics.set(topicKey, {
        number: q.topic,
        title: q.topic_title || 'Без темы',
        questions: [],
      });
    }
    sec.topics.get(topicKey).questions.push(q);
  }
  return Array.from(map.values()).sort((a, b) => a.number - b.number);
}

function topicStats(questions) {
  let correct = 0, wrong = 0, untouched = 0;
  for (const q of questions) {
    const a = Store.getAnswer(q.id);
    if (!a) untouched++;
    else if (a.status === 'correct') correct++;
    else wrong++;
  }
  return { correct, wrong, untouched, total: questions.length };
}

/* ---------- Проверка ответа ---------- */
function checkAnswer(q, given) {
  if (q.type === 'sequence') {
    const correctOrder = q.sequence.map(s => s.text);
    return arraysEqual(given, correctOrder) ? 'correct' : 'wrong';
  }
  if (q.type === 'multi') {
    const correctSet = new Set(q.options.filter(o => o.correct).map(o => o.text));
    const givenSet = new Set(given);
    return setsEqual(correctSet, givenSet) ? 'correct' : 'wrong';
  }
  // single / calc — индекс правильного
  const correctIndex = q.options.findIndex(o => o.correct);
  return given === correctIndex ? 'correct' : 'wrong';
}

/* =========================================================
   Приложение / Роутер
   ========================================================= */
const App = {
  root: document.getElementById('app'),
  topMeta: document.getElementById('topMeta'),
  state: null,

  goHome() {
    this.state = null;
    // Не очищаем lastMode здесь — иначе теряется возможность «Продолжить» общий режим.
    // Очистка происходит только при сбросе прогресса или явном завершении.
    this.renderHome();
  },

  renderHome() {
    this.topMeta.textContent = `Всего вопросов: ${QUESTIONS.length}`;
    const totalAnswered = Object.keys(Store.data.answers).length;
    const totalCorrect = Object.values(Store.data.answers).filter(a => a.status === 'correct').length;
    const totalWrong = totalAnswered - totalCorrect;
    const pct = QUESTIONS.length ? Math.round(totalAnswered / QUESTIONS.length * 100) : 0;

    this.root.innerHTML = '';
    this.root.appendChild(el('div', {},
      el('div', { class: 'stats-bar' },
        el('div', { class: 'stat-item' },
          el('div', { class: 'stat-value' }, String(QUESTIONS.length)),
          el('div', { class: 'stat-label' }, 'Всего')
        ),
        el('div', { class: 'stat-item' },
          el('div', { class: 'stat-value correct' }, String(totalCorrect)),
          el('div', { class: 'stat-label' }, 'Верных')
        ),
        el('div', { class: 'stat-item' },
          el('div', { class: 'stat-value wrong' }, String(totalWrong)),
          el('div', { class: 'stat-label' }, 'Неверных')
        ),
        el('div', { class: 'stat-item' },
          el('div', { class: 'stat-value' }, `${pct}%`),
          el('div', { class: 'stat-label' }, 'Изучено')
        ),
      ),
    ));

    // Возобновление общего режима
    if (Store.data.lastMode && Store.data.lastMode.type === 'all') {
      const lm = Store.data.lastMode;
      this.root.appendChild(el('div', { class: 'question-card', style: 'margin-bottom:18px;' },
        el('div', { class: 'row between' },
          el('div', {},
            el('div', { style: 'font-weight:600;margin-bottom:4px;' }, '📌 Продолжить общий режим'),
            el('div', { class: 'muted small' }, `Остановились на вопросе ${lm.currentIndex + 1} из ${lm.order.length}`)
          ),
          el('button', { class: 'btn-primary', onclick: () => Mode.resumeAll() }, 'Продолжить')
        )
      ));
    }

    this.root.appendChild(el('h2', {}, 'Выберите режим'));
    this.root.appendChild(el('div', { class: 'mode-grid' },
      el('button', { class: 'mode-card', onclick: () => Mode.startAll() },
        el('div', { class: 'mode-card-icon' }, '📖'),
        el('div', { class: 'mode-card-title' }, 'Общий режим'),
        el('div', { class: 'mode-card-desc' }, `Все ${QUESTIONS.length} вопросов по порядку. Прогресс сохраняется автоматически — можно вернуться в любой момент.`)
      ),
      el('button', { class: 'mode-card', onclick: () => Mode.startExam() },
        el('div', { class: 'mode-card-icon' }, '🎯'),
        el('div', { class: 'mode-card-title' }, '40 случайных (экзамен)'),
        el('div', { class: 'mode-card-desc' }, 'Имитация экзамена: 40 случайных вопросов, ответы проверяются в конце, итоговая оценка как в реальном тесте.')
      ),
      el('button', { class: 'mode-card', onclick: () => App.renderTopics() },
        el('div', { class: 'mode-card-icon' }, '📂'),
        el('div', { class: 'mode-card-title' }, 'По разделам и темам'),
        el('div', { class: 'mode-card-desc' }, 'Выберите конкретный раздел или тему для прицельной подготовки. Видна статистика по каждой теме.')
      ),
      el('button', { class: 'mode-card', onclick: () => App.renderErrorsMode() },
        el('div', { class: 'mode-card-icon' }, '🔁'),
        el('div', { class: 'mode-card-title' }, 'Работа над ошибками'),
        el('div', { class: 'mode-card-desc' }, 'Повторите только те вопросы, в которых ошиблись.')
      ),
    ));


    if (totalAnswered > 0) {
      this.root.appendChild(el('div', { style: 'margin-top:32px;text-align:center;' },
        el('button', { class: 'btn-ghost', onclick: () => {
          if (confirm('Точно сбросить весь прогресс? Это действие необратимо.')) {
            Store.resetAll();
            location.reload();
          }
        }}, 'Сбросить весь прогресс')
      ));
    }
  },

  renderTopics() {
    this.topMeta.textContent = 'Разделы и темы';
    this.root.innerHTML = '';
    this.root.appendChild(el('button', { class: 'btn-ghost', onclick: () => App.goHome() }, '← К меню'));

    const sections = getSections();
    const list = el('div', { class: 'topic-list', style: 'margin-top:16px;' });

    for (const sec of sections) {
      const block = el('div', { class: 'section-block' });
      const allQs = [];
      for (const t of sec.topics.values()) allQs.push(...t.questions);
      const secStats = topicStats(allQs);

      block.appendChild(el('div', { class: 'section-header row between' },
        el('span', {}, `Раздел ${sec.number}. ${sec.title}`),
        el('span', { class: 'muted small' }, `${secStats.correct}/${secStats.total} верно`)
      ));

      // кнопка "пройти весь раздел"
      block.appendChild(el('div', { class: 'topic-row', onclick: () => Mode.startSubset(allQs, `Раздел ${sec.number}`) },
        el('div', { class: 'topic-title' },
          el('div', { class: 'topic-name' }, `▶ Пройти весь раздел`),
          el('div', { class: 'topic-meta' }, `${allQs.length} вопросов`)
        ),
        el('div', { class: 'topic-progress' }, renderProgressNum(secStats))
      ));

      for (const t of sec.topics.values()) {
        const tStats = topicStats(t.questions);
        const row = el('div', { class: 'topic-row', onclick: () => Mode.startSubset(t.questions, t.title) },
          el('div', { class: 'topic-title' },
            el('div', { class: 'topic-name' }, t.number ? `${t.number}. ${t.title}` : t.title),
            el('div', { class: 'topic-meta' }, `${t.questions.length} вопросов`)
          ),
          el('div', { class: 'topic-progress' }, renderProgressNum(tStats))
        );
        block.appendChild(row);
      }
      list.appendChild(block);
    }
    this.root.appendChild(list);
  },

  renderErrorsMode() {
    const errorQs = QUESTIONS.filter(q => {
      const a = Store.getAnswer(q.id);
      return a && a.status === 'wrong';
    });
    if (errorQs.length === 0) {
      alert('Ошибок пока нет 🎉');
      return;
    }
    Mode.startSubset(errorQs, `Работа над ошибками (${errorQs.length})`);
  },

  renderPatchesList() {
    this.topMeta.textContent = 'Мои правки';
    this.root.innerHTML = '';
    this.root.appendChild(el('button', { class: 'btn-ghost', onclick: () => App.goHome() }, '← К меню'));

    const overrides = Store.getAllOverrides();
    const entries = Object.entries(overrides);
    if (entries.length === 0) {
      this.root.appendChild(el('div', { class: 'question-card', style: 'margin-top:16px;' },
        el('div', { class: 'muted' }, 'Правок пока нет.')));
      return;
    }
    // отсортируем по времени, новые сверху
    entries.sort((a, b) => (b[1].ts || 0) - (a[1].ts || 0));



    const list = el('div', { class: 'topic-list', style: 'margin-top:16px;' });
    for (const [qid, patch] of entries) {
      const q = getQuestion(Number(qid));
      if (!q) continue;
      const dt = patch.ts ? new Date(patch.ts).toLocaleString('ru-RU') : '';
      const fields = [];
      if (patch.text !== undefined) fields.push('текст');
      if (patch.options !== undefined) fields.push('варианты/ответы');
      if (patch.sequence !== undefined) fields.push('последовательность');
      if (patch.solution !== undefined) fields.push('решение');

      list.appendChild(el('div', { class: 'question-card' },
        el('div', { class: 'question-meta' },
          el('div', {},
            el('span', { class: 'edited-badge' }, `#${qid}`),
            el('span', { class: 'muted small', style: 'margin-left:8px;' },
              q.topic ? `${q.topic}. ${q.topic_title}` : (q.section_title || ''))
          ),
          el('span', { class: 'muted small' }, dt)
        ),
        el('div', { class: 'question-text', style: 'font-size:14px;' }, q.text),
        el('div', { class: 'muted small', style: 'margin-bottom:10px;' },
          'Изменено: ' + fields.join(', ')),
        el('div', { class: 'row' },
          el('button', { onclick: () => Editor.open(Number(qid)) }, '✏️ Открыть в редакторе'),
          el('button', { class: 'btn-danger', onclick: () => {
            if (confirm('Откатить правку и вернуть оригинал?')) {
              Store.removeOverride(Number(qid));
              App.renderPatchesList();
            }
          }}, '↺ Откатить'),
        )
      ));
    }
    this.root.appendChild(list);
  },
};

function renderProgressNum(stats) {
  const span = document.createElement('span');
  const pct = stats.total ? Math.round(stats.correct / stats.total * 100) : 0;
  span.innerHTML = `<span class="pct">${stats.correct}/${stats.total}</span> · ${pct}%`;
  return span;
}

/* =========================================================
   Режимы
   ========================================================= */
const Mode = {
  // Общий режим: все вопросы по порядку, прогресс сохраняется в lastMode
  startAll() {
    const order = QUESTIONS.map(q => q.id);
    const session = {
      kind: 'practice',     // practice = по одному с моментальной проверкой
      title: 'Общий режим',
      order,
      currentIndex: 0,
      saveAsLastMode: 'all',
    };
    Store.setLastMode({ type: 'all', currentIndex: 0, order });
    Session.start(session);
  },

  resumeAll() {
    const lm = Store.data.lastMode;
    if (!lm) return App.goHome();
    Session.start({
      kind: 'practice',
      title: 'Общий режим',
      order: lm.order,
      currentIndex: lm.currentIndex || 0,
      saveAsLastMode: 'all',
    });
  },

  // Экзамен: 40 случайных, проверка в конце
  startExam() {
    const ids = shuffle(QUESTIONS.map(q => q.id)).slice(0, Math.min(40, QUESTIONS.length));
    Session.start({
      kind: 'exam',
      title: 'Экзамен (40 вопросов)',
      order: ids,
      currentIndex: 0,
    });
  },

  // Произвольный сабсет — режим практики
  startSubset(questions, title) {
    const order = questions.map(q => q.id);
    Session.start({
      kind: 'practice',
      title,
      order,
      currentIndex: 0,
    });
  },
};

/* =========================================================
   Сессия (одна за раз)
   ========================================================= */
const Session = {
  s: null,             // объект сессии
  // временное состояние внутри текущего вопроса
  ui: null,

  start(session) {
    this.s = session;
    this.ui = null;
    this.renderCurrent();
  },

  currentQuestion() {
    const id = this.s.order[this.s.currentIndex];
    return getQuestion(id);
  },

  // Восстановить состояние UI вопроса по сохранённому ответу
  uiFromStored(q, stored) {
    const ui = { checked: true, status: stored.status };
    if (q.type === 'sequence') {
      ui.type = 'sequence';
      ui.order = Array.isArray(stored.given) ? stored.given.slice() : q.sequence.map(s => s.text);
      const correctOrder = q.sequence.map(s => s.text);
      ui.correctnessByIndex = ui.order.map((t, i) => t === correctOrder[i]);
    } else if (q.type === 'multi') {
      ui.type = 'multi';
      const givenTexts = new Set(Array.isArray(stored.given) ? stored.given : []);
      ui.chosen = new Set();
      q.options.forEach((o, i) => { if (givenTexts.has(o.text)) ui.chosen.add(i); });
    } else {
      ui.type = 'single';
      ui.chosen = typeof stored.given === 'number' ? stored.given : null;
    }
    return ui;
  },

  goNext() {
    if (this.s.currentIndex < this.s.order.length - 1) {
      this.s.currentIndex++;
      this.persistLast();
      this.ui = null;
      this.renderCurrent();
    } else {
      // достигли конца
      if (this.s.kind === 'exam') {
        this.finishExam();
      } else {
        this.renderPracticeEnd();
      }
    }
  },

  goPrev() {
    if (this.s.currentIndex > 0) {
      this.s.currentIndex--;
      this.persistLast();
      this.ui = null;
      this.renderCurrent();
    }
  },

  jumpTo(idx) {
    if (idx < 0 || idx >= this.s.order.length) return;
    this.s.currentIndex = idx;
    this.persistLast();
    this.ui = null;
    this.renderCurrent();
  },

  persistLast() {
    if (this.s.saveAsLastMode === 'all') {
      Store.setLastMode({ type: 'all', currentIndex: this.s.currentIndex, order: this.s.order });
    }
  },

  renderCurrent() {
    const q = this.currentQuestion();
    App.topMeta.textContent = `${this.s.title} · ${this.s.currentIndex + 1} / ${this.s.order.length}`;

    // Если на этот вопрос уже отвечали в прошлом, восстановим состояние
    // (важно для возврата «Назад» и для палитры — чтобы видно было результат).
    if (!this.ui) {
      const stored = Store.getAnswer(q.id);
      if (stored) {
        this.ui = this.uiFromStored(q, stored);
      }
    }

    App.root.innerHTML = '';
    App.root.appendChild(el('div', { class: 'row between' },
      el('button', { class: 'btn-ghost', onclick: () => App.goHome() }, '← Меню'),
      el('div', { class: 'muted small' }, q.topic ? `${q.topic}. ${q.topic_title}` : (q.section_title || ''))
    ));

    // Прогресс-бар по сессии
    const progress = Math.round((this.s.currentIndex + 1) / this.s.order.length * 100);
    App.root.appendChild(el('div', { class: 'progress', style: 'margin:14px 0;' },
      el('div', { class: 'progress-fill', style: `width:${progress}%` })
    ));

    // Палитра вопросов (только для practice с >1 вопросом и не слишком длинной сессии)
    if (this.s.kind === 'practice' && this.s.order.length > 1 && this.s.order.length <= 500) {
      const grid = el('div', { class: 'question-grid' });
      this.s.order.forEach((qid, idx) => {
        const a = Store.getAnswer(qid);
        const classes = ['q-chip'];
        if (idx === this.s.currentIndex) classes.push('current');
        if (a && a.status === 'correct') classes.push('correct');
        if (a && a.status === 'wrong') classes.push('wrong');
        grid.appendChild(el('button', {
          class: classes.join(' '),
          onclick: () => this.jumpTo(idx),
          title: `Вопрос ${idx + 1}`,
        }, String(idx + 1)));
      });
      App.root.appendChild(grid);
    }

    // Карточка вопроса
    App.root.appendChild(this.renderQuestionCard(q));

    // Навигация
    const nav = el('div', { class: 'nav-bar' });
    nav.appendChild(el('button', {
      onclick: () => this.goPrev(),
      disabled: this.s.currentIndex === 0,
    }, '← Назад'));

    nav.appendChild(el('div', { class: 'spacer' }));

    // Одна основная кнопка: пока не проверили — «Проверить»,
    // после проверки — «Дальше →» (или «Завершить» на последнем вопросе).
    const checked = this.ui && this.ui.checked;
    const isLast = this.s.currentIndex === this.s.order.length - 1;

    let label, action;
    if (!checked) {
      label = 'Проверить';
      action = () => this.checkPracticeAnswer();
    } else if (isLast) {
      label = this.s.kind === 'exam' ? 'Завершить экзамен' : 'Завершить';
      action = () => {
        if (this.s.kind === 'exam') this.finishExam();
        else this.renderPracticeEnd();
      };
    } else {
      label = 'Дальше →';
      action = () => this.goNext();
    }
    nav.appendChild(el('button', { class: 'btn-primary', onclick: action }, label));

    // Дополнительная кнопка «Пропустить» (только до проверки, не на последнем) —
    // на случай если человек не знает ответа и хочет двигаться дальше
    if (!checked && !isLast) {
      nav.appendChild(el('button', {
        class: 'btn-ghost',
        onclick: () => this.goNext(),
      }, 'Пропустить'));
    }

    App.root.appendChild(nav);

    // Счётчик
    App.root.appendChild(el('div', { class: 'nav-counter', style: 'margin-top:10px;' },
      `Вопрос ${this.s.currentIndex + 1} из ${this.s.order.length}`));
  },

  renderQuestionCard(q) {
    const card = el('div', { class: 'question-card' });

    // Метаданные / теги
    const meta = el('div', { class: 'question-meta' });
    const tagsLeft = el('div', {});
    if (q.type === 'multi') tagsLeft.appendChild(el('span', { class: 'question-tag multi' }, 'несколько ответов'));
    else if (q.type === 'calc') tagsLeft.appendChild(el('span', { class: 'question-tag calc' }, '🔢 расчёт'));
    else if (q.type === 'sequence') tagsLeft.appendChild(el('span', { class: 'question-tag seq' }, 'последовательность'));
    else tagsLeft.appendChild(el('span', { class: 'question-tag' }, 'один ответ'));
    meta.appendChild(tagsLeft);
    meta.appendChild(el('span', { class: 'muted small' }, `#${q.id}`));
    card.appendChild(meta);

    // Картинка (если будет)
    if (q.image) {
      card.appendChild(el('img', { class: 'question-image', src: q.image, alt: '' }));
    }

    // Текст вопроса
    card.appendChild(el('div', { class: 'question-text' }, q.text));

    // Варианты — отдельная функция по типу
    if (q.type === 'sequence') {
      card.appendChild(this.renderSequence(q));
    } else if (q.type === 'multi') {
      card.appendChild(this.renderMulti(q));
    } else {
      card.appendChild(this.renderSingle(q));
    }

    // Если уже проверили (и в practice, и в exam) — покажем feedback
    if (this.ui && this.ui.checked) {
      const fb = el('div', {
        class: `feedback ${this.ui.status}`
      },
        el('strong', {}, this.ui.status === 'correct' ? '✓ Верно' : '✗ Неверно'),
        this.ui.status === 'wrong' ? el('div', {}, 'Правильный ответ подсвечен зелёным.') : null
      );
      card.appendChild(fb);
      if (q.solution) {
        card.appendChild(el('div', { class: 'solution-block' },
          el('strong', {}, '💡 Решение: '),
          q.solution
        ));
      }
    }



    return card;
  },
  renderSingle(q) {
    const wrap = el('div', { class: 'options' });
    if (!this.ui) this.ui = { type: 'single', chosen: null, checked: false };
    // Перемешивать варианты? Не будем, чтобы пользователь мог запомнить расположение
    q.options.forEach((opt, idx) => {
      const classes = ['option'];
      if (this.ui.chosen === idx) classes.push('selected');
      if (this.ui.checked) {
        if (opt.correct) classes.push('correct');
        else if (this.ui.chosen === idx) classes.push('wrong');
      }
      const optEl = el('div', {
        class: classes.join(' '),
        onclick: () => {
          if (this.ui.checked) return;
          this.ui.chosen = idx;
          this.renderCurrent();
        }
      },
        el('div', { class: 'option-marker' }),
        el('div', { class: 'option-text' }, opt.text)
      );
      wrap.appendChild(optEl);
    });
    return wrap;
  },

  /* ---- multi ---- */
  renderMulti(q) {
    const wrap = el('div', { class: 'options' });
    if (!this.ui) this.ui = { type: 'multi', chosen: new Set(), checked: false };
    q.options.forEach((opt, idx) => {
      const classes = ['option'];
      const isSel = this.ui.chosen.has(idx);
      if (isSel) classes.push('selected');
      if (this.ui.checked) {
        if (opt.correct) classes.push(isSel ? 'correct' : 'reveal-correct');
        else if (isSel) classes.push('wrong');
      }
      const optEl = el('div', {
        class: classes.join(' '),
        onclick: () => {
          if (this.ui.checked) return;
          if (this.ui.chosen.has(idx)) this.ui.chosen.delete(idx);
          else this.ui.chosen.add(idx);
          this.renderCurrent();
        }
      },
        el('div', { class: 'option-marker square' }),
        el('div', { class: 'option-text' }, opt.text)
      );
      wrap.appendChild(optEl);
    });
    if (!this.ui.checked) {
      wrap.appendChild(el('div', { class: 'muted small', style: 'margin-top:6px;' },
        'Выберите все правильные варианты'));
    }
    return wrap;
  },

  /* ---- sequence (drag&drop + кнопки ↑/↓ для мобильных) ---- */
  renderSequence(q) {
    if (!this.ui) {
      // изначально перемешать
      this.ui = {
        type: 'sequence',
        order: shuffle(q.sequence.map(s => s.text)),
        checked: false,
        correctnessByIndex: null,
      };
    }
    const wrap = el('div', { class: 'sequence-list' });
    const moveItem = (from, to) => {
      if (to < 0 || to >= this.ui.order.length) return;
      const arr = this.ui.order;
      const [m] = arr.splice(from, 1);
      arr.splice(to, 0, m);
      this.renderCurrent();
    };

    this.ui.order.forEach((text, idx) => {
      const classes = ['seq-item'];
      if (this.ui.checked && this.ui.correctnessByIndex) {
        classes.push(this.ui.correctnessByIndex[idx] ? 'correct' : 'wrong');
      }
      const children = [
        el('span', { class: 'seq-handle' }, '⋮⋮'),
        el('span', { class: 'seq-num' }, String(idx + 1)),
        el('span', { class: 'seq-text' }, text),
      ];
      // Кнопки ↑/↓ только пока не проверили
      if (!this.ui.checked) {
        children.push(el('button', {
          class: 'seq-btn',
          onclick: (e) => { e.stopPropagation(); moveItem(idx, idx - 1); },
          disabled: idx === 0,
          title: 'Выше',
        }, '↑'));
        children.push(el('button', {
          class: 'seq-btn',
          onclick: (e) => { e.stopPropagation(); moveItem(idx, idx + 1); },
          disabled: idx === this.ui.order.length - 1,
          title: 'Ниже',
        }, '↓'));
      }
      const item = el('div', {
        class: classes.join(' '),
        draggable: !this.ui.checked,
        dataset: { idx: String(idx) },
      }, ...children);
      if (!this.ui.checked) this.attachDragHandlers(item);
      wrap.appendChild(item);
    });

    if (this.ui.checked) {
      const correctOrder = q.sequence.map(s => s.text);
      wrap.appendChild(el('div', { class: 'solution-block', style: 'margin-top:12px;' },
        el('strong', {}, 'Правильный порядок: '),
        el('ol', { style: 'margin:6px 0 0;padding-left:22px;' },
          ...correctOrder.map(t => el('li', {}, t))
        )
      ));
    } else {
      wrap.appendChild(el('div', { class: 'muted small', style: 'margin-top:6px;' },
        'Перетащите пункты или используйте стрелки ↑↓ чтобы выстроить порядок'));
    }
    return wrap;
  },

  attachDragHandlers(item) {
    item.addEventListener('dragstart', e => {
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', item.dataset.idx);
    });
    item.addEventListener('dragend', () => item.classList.remove('dragging'));
    item.addEventListener('dragover', e => { e.preventDefault(); item.classList.add('drag-over'); });
    item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
    item.addEventListener('drop', e => {
      e.preventDefault();
      item.classList.remove('drag-over');
      const fromIdx = Number(e.dataTransfer.getData('text/plain'));
      const toIdx = Number(item.dataset.idx);
      if (fromIdx === toIdx) return;
      const arr = this.ui.order;
      const [moved] = arr.splice(fromIdx, 1);
      arr.splice(toIdx, 0, moved);
      this.renderCurrent();
    });
  },

  /* ---- проверка ответа в practice ---- */
  checkPracticeAnswer() {
    const q = this.currentQuestion();
    if (!this.ui) return;
    let given, status;
    if (q.type === 'sequence') {
      given = this.ui.order;
      const correctOrder = q.sequence.map(s => s.text);
      status = arraysEqual(given, correctOrder) ? 'correct' : 'wrong';
      this.ui.correctnessByIndex = given.map((t, i) => t === correctOrder[i]);
    } else if (q.type === 'multi') {
      if (this.ui.chosen.size === 0) {
        alert('Выберите хотя бы один вариант');
        return;
      }
      const givenTexts = [...this.ui.chosen].map(i => q.options[i].text);
      given = givenTexts;
      const correctSet = new Set(q.options.filter(o => o.correct).map(o => o.text));
      status = setsEqual(correctSet, new Set(givenTexts)) ? 'correct' : 'wrong';
    } else {
      if (this.ui.chosen === null) {
        alert('Выберите вариант ответа');
        return;
      }
      given = this.ui.chosen;
      status = q.options[this.ui.chosen].correct ? 'correct' : 'wrong';
    }
    this.ui.checked = true;
    this.ui.status = status;
    Store.recordAnswer(q.id, status, given);
    this.renderCurrent();
  },

  finishExam() {
    const results = [];
    let correctCount = 0;
    for (const qid of this.s.order) {
      const q = getQuestion(qid);
      const stored = Store.getAnswer(qid);
      const given = stored ? stored.given : null;
      const status = stored ? stored.status : 'wrong'; // вопросы без ответа считаются неверными
      if (status === 'correct') correctCount++;
      results.push({ q, given, status, answered: !!stored });
    }
    this.renderExamResults(correctCount, results);
  },

  renderExamResults(correctCount, results) {
    const total = results.length;
    const pct = total ? Math.round(correctCount / total * 100) : 0;
    let grade, gradeClass;
    if (pct >= 85) { grade = 'Отлично'; gradeClass = 'grade-otl'; }
    else if (pct >= 75) { grade = 'Хорошо'; gradeClass = 'grade-hor'; }
    else if (pct >= 60) { grade = 'Удовлетворительно'; gradeClass = 'grade-udov'; }
    else { grade = 'Неудовлетворительно'; gradeClass = 'grade-neud'; }

    App.topMeta.textContent = 'Результаты экзамена';
    App.root.innerHTML = '';
    App.root.appendChild(el('div', { class: 'result-banner' },
      el('div', { class: 'muted' }, 'Ваш результат'),
      el('div', { class: `result-score ${gradeClass}` }, `${correctCount} / ${total}`),
      el('div', { class: `result-grade ${gradeClass}` }, `${pct}% — ${grade}`),
      el('div', { class: 'result-detail' }, 'Шкала: 85% — отлично, 75% — хорошо, 60% — удовл.')
    ));

    App.root.appendChild(el('div', { class: 'nav-bar' },
      el('button', { class: 'btn-primary', onclick: () => Mode.startExam() }, '🔄 Новый экзамен'),
      el('button', { onclick: () => {
        const errorQs = results.filter(r => r.status === 'wrong').map(r => r.q);
        if (errorQs.length === 0) { alert('Ошибок нет!'); return; }
        Mode.startSubset(errorQs, `Ошибки экзамена (${errorQs.length})`);
      }}, '🔁 Разобрать ошибки'),
      el('div', { class: 'spacer' }),
      el('button', { class: 'btn-ghost', onclick: () => App.goHome() }, '← В меню')
    ));

    // Список вопросов с разбором
    App.root.appendChild(el('h2', {}, 'Подробный разбор'));
    const list = el('div', { class: 'topic-list' });
    results.forEach((r, idx) => {
      const card = el('div', { class: 'question-card' });
      card.appendChild(el('div', { class: 'question-meta' },
        el('div', {},
          el('span', { class: `question-tag ${r.status === 'correct' ? '' : ''}`,
            style: `background:${r.status === 'correct' ? 'var(--correct-bg)' : 'var(--wrong-bg)'};color:${r.status === 'correct' ? 'var(--correct)' : 'var(--wrong)'};` },
            r.status === 'correct' ? '✓' : '✗'),
          el('span', { class: 'muted small' }, ` Вопрос ${idx + 1}`)
        ),
        el('span', { class: 'muted small' }, `#${r.q.id}`)
      ));
      card.appendChild(el('div', { class: 'question-text', style: 'font-size:14px;' }, r.q.text));

      // показать правильные варианты
      if (r.q.type === 'sequence') {
        const ol = el('ol', { style: 'margin:0;padding-left:22px;' },
          ...r.q.sequence.map(s => el('li', {}, s.text))
        );
        card.appendChild(el('div', { class: 'muted small', style: 'margin-bottom:4px;' }, 'Правильный порядок:'));
        card.appendChild(ol);
      } else {
        const opts = el('div', { class: 'options' });
        r.q.options.forEach((o, oi) => {
          const classes = ['option'];
          // given для single = индекс (число), для multi = массив текстов
          let userPicked = false;
          if (Array.isArray(r.given)) userPicked = r.given.includes(o.text);
          else userPicked = (r.given === oi);
          if (o.correct) classes.push('reveal-correct');
          if (userPicked && !o.correct) classes.push('wrong');
          opts.appendChild(el('div', { class: classes.join(' ') },
            el('div', { class: 'option-marker' + (r.q.type === 'multi' ? ' square' : '') }),
            el('div', { class: 'option-text' }, o.text)
          ));
        });
        card.appendChild(opts);
      }
      if (r.q.solution) {
        card.appendChild(el('div', { class: 'solution-block' },
          el('strong', {}, '💡 '), r.q.solution
        ));
      }
      list.appendChild(card);
    });
    App.root.appendChild(list);
  },

  renderPracticeEnd() {
    // Подсчёт по сессии
    const total = this.s.order.length;
    let correctCount = 0, wrongCount = 0, skipped = 0;
    for (const qid of this.s.order) {
      const a = Store.getAnswer(qid);
      if (!a) skipped++;
      else if (a.status === 'correct') correctCount++;
      else wrongCount++;
    }
    App.topMeta.textContent = 'Готово';
    App.root.innerHTML = '';
    App.root.appendChild(el('div', { class: 'result-banner' },
      el('div', { class: 'muted' }, this.s.title),
      el('div', { class: 'result-score grade-otl' }, `${correctCount} / ${total}`),
      el('div', { class: 'result-detail' }, `Неверных: ${wrongCount} · Без ответа: ${skipped}`)
    ));
    App.root.appendChild(el('div', { class: 'nav-bar' },
      el('button', { class: 'btn-primary', onclick: () => App.goHome() }, '← В меню'),
      this.s.saveAsLastMode === 'all' ? el('button', { onclick: () => {
        if (confirm('Сбросить прогресс по общему режиму?')) {
          Store.clearLastMode();
          App.goHome();
        }
      }}, 'Сбросить общий прогресс') : null
    ));
  }
};

/* =========================================================
   Редактор вопроса (модальное окно)
   ========================================================= */
const Editor = {
  open(qid) {
    const original = QUESTIONS_BY_ID.get(qid);
    if (!original) return;
    const current = getQuestion(qid); // с учётом уже существующего оверрайда
    // Делаем глубокую копию полей, которые будем редактировать
    const draft = {
      qid,
      text: current.text,
      type: current.type,
      solution: current.solution || '',
      options: (current.options || []).map(o => ({ text: o.text, correct: o.correct })),
      sequence: current.sequence ? current.sequence.map(s => ({ order: s.order, text: s.text })) : null,
    };
    this.draft = draft;
    this.original = original;
    this.render();
  },

  close() {
    this.draft = null;
    const overlay = document.getElementById('editor-modal');
    if (overlay) overlay.remove();
  },

  render() {
    // Удалить старое, если было
    const old = document.getElementById('editor-modal');
    if (old) old.remove();

    const d = this.draft;
    const overlay = el('div', { class: 'modal-overlay', id: 'editor-modal' });
    overlay.addEventListener('click', e => { if (e.target === overlay) this.close(); });

    const modal = el('div', { class: 'modal' });

    // Header
    modal.appendChild(el('div', { class: 'modal-header' },
      el('h3', { class: 'modal-title' }, `Редактирование вопроса #${d.qid}`),
      el('button', { class: 'modal-close', onclick: () => this.close(), title: 'Закрыть' }, '×')
    ));

    modal.appendChild(el('div', { class: 'modal-hint' },
      'Правки сохраняются только на этом устройстве.'
    ));

    // Текст вопроса
    const textArea = el('textarea', { id: 'edit-text', rows: '3' });
    textArea.value = d.text;
    textArea.addEventListener('input', e => d.text = e.target.value);
    modal.appendChild(el('div', { class: 'modal-section' },
      el('div', { class: 'modal-label' }, 'Текст вопроса'),
      textArea,
    ));

    // Варианты или последовательность
    if (d.type === 'sequence') {
      modal.appendChild(this.renderSequenceEditor(d));
    } else {
      modal.appendChild(this.renderOptionsEditor(d));
    }

    // Решение (для расчётных или если уже есть)
    if (d.type === 'calc' || d.solution) {
      const solArea = el('textarea', { rows: '3' });
      solArea.value = d.solution;
      solArea.addEventListener('input', e => d.solution = e.target.value);
      modal.appendChild(el('div', { class: 'modal-section' },
        el('div', { class: 'modal-label' }, 'Решение / пояснение (необязательно)'),
        solArea,
      ));
    }

    // Кнопки действий
    const actions = el('div', { class: 'modal-actions' });
    actions.appendChild(el('button', { onclick: () => this.close() }, 'Отмена'));
    if (Store.getOverride(d.qid)) {
      actions.appendChild(el('button', {
        class: 'btn-danger',
        onclick: () => {
          if (confirm('Откатить правки и вернуть оригинальный вопрос?')) {
            Store.removeOverride(d.qid);
            this.close();
            // Перерисовать текущий экран
            if (Session.s) { Session.ui = null; Session.renderCurrent(); }
          }
        }
      }, 'Откатить к оригиналу'));
    }
    actions.appendChild(el('div', { class: 'spacer' }));
    actions.appendChild(el('button', {
      class: 'btn-primary',
      onclick: () => this.save(),
    }, 'Сохранить'));
    modal.appendChild(actions);

    overlay.appendChild(modal);
    document.body.appendChild(overlay);
  },

  renderOptionsEditor(d) {
    const section = el('div', { class: 'modal-section' });
    section.appendChild(el('div', { class: 'modal-label' },
      d.type === 'multi' ? 'Варианты (нажмите ✓ чтобы отметить правильные — можно несколько)' :
      'Варианты (нажмите ✓ чтобы выбрать правильный)'));

    const list = el('div', {});
    const rerender = () => {
      list.innerHTML = '';
      d.options.forEach((opt, idx) => {
        const item = el('div', { class: 'editor-option' + (opt.correct ? ' is-correct' : '') });
        item.appendChild(el('button', {
          class: 'editor-option-toggle',
          title: opt.correct ? 'Снять отметку правильного' : 'Отметить как правильный',
          onclick: () => {
            if (d.type === 'single' || d.type === 'calc') {
              // single: один правильный — снимаем у всех, ставим у выбранного
              d.options.forEach(o => o.correct = false);
              opt.correct = true;
            } else {
              // multi: переключаем
              opt.correct = !opt.correct;
            }
            rerender();
          },
        }, opt.correct ? '✓' : ''));
        const ta = el('textarea', { rows: '2' });
        ta.value = opt.text;
        ta.addEventListener('input', e => opt.text = e.target.value);
        item.appendChild(ta);
        item.appendChild(el('button', {
          class: 'editor-option-remove',
          title: 'Удалить вариант',
          onclick: () => {
            if (d.options.length <= 2) { alert('Должно быть минимум 2 варианта'); return; }
            d.options.splice(idx, 1);
            rerender();
          }
        }, '×'));
        list.appendChild(item);
      });
      list.appendChild(el('button', {
        class: 'editor-add-opt',
        onclick: () => { d.options.push({ text: '', correct: false }); rerender(); }
      }, '+ Добавить вариант'));
    };
    rerender();
    section.appendChild(list);
    return section;
  },

  renderSequenceEditor(d) {
    const section = el('div', { class: 'modal-section' });
    section.appendChild(el('div', { class: 'modal-label' },
      'Шаги в правильном порядке (сверху — первый)'));

    const list = el('div', {});
    const rerender = () => {
      // нормализуем order
      d.sequence.forEach((s, i) => s.order = i + 1);
      list.innerHTML = '';
      d.sequence.forEach((s, idx) => {
        const item = el('div', { class: 'editor-seq-item' });
        item.appendChild(el('span', { class: 'editor-seq-num' }, String(idx + 1) + '.'));
        const input = el('input', { type: 'text' });
        input.value = s.text;
        input.addEventListener('input', e => s.text = e.target.value);
        item.appendChild(input);
        // up/down/remove
        item.appendChild(el('button', {
          class: 'editor-option-remove',
          title: 'Выше',
          disabled: idx === 0,
          onclick: () => {
            const [m] = d.sequence.splice(idx, 1);
            d.sequence.splice(idx - 1, 0, m);
            rerender();
          }
        }, '↑'));
        item.appendChild(el('button', {
          class: 'editor-option-remove',
          title: 'Ниже',
          disabled: idx === d.sequence.length - 1,
          onclick: () => {
            const [m] = d.sequence.splice(idx, 1);
            d.sequence.splice(idx + 1, 0, m);
            rerender();
          }
        }, '↓'));
        item.appendChild(el('button', {
          class: 'editor-option-remove',
          title: 'Удалить',
          onclick: () => {
            if (d.sequence.length <= 2) { alert('Должно быть минимум 2 шага'); return; }
            d.sequence.splice(idx, 1);
            rerender();
          }
        }, '×'));
        list.appendChild(item);
      });
      list.appendChild(el('button', {
        class: 'editor-add-opt',
        onclick: () => { d.sequence.push({ order: d.sequence.length + 1, text: '' }); rerender(); }
      }, '+ Добавить шаг'));
    };
    rerender();
    section.appendChild(list);
    return section;
  },

  save() {
    const d = this.draft;
    // Валидация
    if (!d.text || d.text.trim().length < 3) {
      alert('Текст вопроса не может быть пустым');
      return;
    }
    if (d.type === 'sequence') {
      if (!d.sequence || d.sequence.length < 2) {
        alert('Должно быть минимум 2 шага');
        return;
      }
      if (d.sequence.some(s => !s.text.trim())) {
        alert('Все шаги должны иметь текст');
        return;
      }
    } else {
      if (!d.options || d.options.length < 1) {
        alert('Должен быть хотя бы один вариант');
        return;
      }
      if (d.options.some(o => !o.text.trim())) {
        alert('Все варианты должны иметь текст');
        return;
      }
      if (!d.options.some(o => o.correct)) {
        alert('Отметьте хотя бы один правильный вариант (кружком ✓ слева)');
        return;
      }
    }

    // Считаем «правкой» только те поля, которые отличаются от оригинала
    const orig = this.original;
    const patch = {};
    if (d.text.trim() !== orig.text) patch.text = d.text.trim();
    if (d.type !== 'sequence') {
      const a = JSON.stringify(orig.options.map(o => ({ text: o.text, correct: o.correct })));
      const b = JSON.stringify(d.options.map(o => ({ text: o.text.trim(), correct: o.correct })));
      if (a !== b) patch.options = d.options.map(o => ({ text: o.text.trim(), correct: o.correct }));
    } else {
      const a = JSON.stringify((orig.sequence || []).map(s => s.text));
      const b = JSON.stringify(d.sequence.map(s => s.text.trim()));
      if (a !== b) {
        patch.sequence = d.sequence.map((s, i) => ({ order: i + 1, text: s.text.trim() }));
      }
    }
    if ((d.solution || '') !== (orig.solution || '')) {
      patch.solution = d.solution.trim();
    }

    if (Object.keys(patch).length === 0) {
      // ничего не изменилось — если был оверрайд, можем его убрать
      if (Store.getOverride(d.qid)) {
        Store.removeOverride(d.qid);
      }
      this.close();
      return;
    }

    Store.setOverride(d.qid, patch);
    // Сбросим сохранённый ответ — правильный мог измениться
    delete Store.data.answers[d.qid];
    Store.save();
    this.close();
    // Перерисовка
    if (Session.s) { Session.ui = null; Session.renderCurrent(); }
    else App.renderHome();
  },
};

/* =========================================================
   Импорт / Экспорт правок
   ========================================================= */
const PatchIO = {
  exportFile() {
    const overrides = Store.getAllOverrides();
    if (Object.keys(overrides).length === 0) {
      alert('Пока нет ни одной правки — нечего экспортировать.');
      return;
    }
    const payload = {
      version: 1,
      generated_at: new Date().toISOString(),
      count: Object.keys(overrides).length,
      overrides,
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const ts = new Date().toISOString().slice(0, 10);
    a.download = `gosexam-правки-${ts}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  },

  importFile() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json,.json';
    input.addEventListener('change', e => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const obj = JSON.parse(ev.target.result);
          // Поддерживаем два формата: {overrides: {...}} или просто {qid: {...}}
          const data = obj.overrides || obj;
          if (typeof data !== 'object' || data === null) {
            alert('Неверный формат файла.');
            return;
          }
          const choice = confirm(
            `Импортировать правки из файла?\n\n` +
            `Найдено правок: ${Object.keys(data).length}\n\n` +
            `OK — добавить к существующим\n` +
            `Отмена — не импортировать`
          );
          if (!choice) return;
          const added = Store.importOverrides(data, 'merge');
          alert(`Импортировано правок: ${added}`);
          App.renderHome();
        } catch (err) {
          alert('Не удалось прочитать файл: ' + err.message);
        }
      };
      reader.readAsText(file);
    });
    input.click();
  },
};

/* API Sync — прогресс через VPS (синхронизация с ботом) */
const API_URL = 'https://gosbot.ddns.net';  // ← вставить домен/IP VPS с https://

(function() {
  const tgUser   = tg?.initDataUnsafe?.user;
  const initData = tg?.initData || '';

  // Обёртка над Store.save — дополнительно шлём на API (fire-and-forget)
  const _saveLocal = Store.save.bind(Store);
  Store.save = function() {
    _saveLocal();
    if (!tgUser?.id || !initData || !API_URL.startsWith('https')) return;
    fetch(`${API_URL}/progress/${tgUser.id}`, {
      method: 'POST',
      headers: {
        'Content-Type':  'application/json',
        'Authorization': 'TgInitData ' + initData,
      },
      body: JSON.stringify({
        answers:   Store.data.answers,
        last_mode: Store.data.lastMode || null,
      }),
    }).catch(() => {});
  };

  // Загрузка прогресса с API при старте
  Store.loadFromCloud = async function(cb) {
    if (!tgUser?.id || !initData || !API_URL.startsWith('https')) { cb(); return; }
    try {
      const r = await fetch(`${API_URL}/progress/${tgUser.id}`, {
        headers: { 'Authorization': 'TgInitData ' + initData },
      });
      if (r.ok) {
        const data = await r.json();
        // Мерж: побеждает более свежий timestamp
        if (data.answers) {
          for (const [id, v] of Object.entries(data.answers)) {
            const loc = Store.data.answers[id];
            if (!loc || (v.ts||0) > (loc.ts||0)) Store.data.answers[id] = v;
          }
        }
        // Восстанавливаем позицию общего режима из API
        if (data.last_mode && !Store.data.lastMode) {
          Store.data.lastMode = data.last_mode;
        }
        _saveLocal();
      }
    } catch(e) { console.warn('API sync error:', e); }
    cb();
  };
})();

/* Старт */
async function boot() {
  const loader = document.getElementById('tg-loader');
  const ltext  = document.getElementById('tg-loader-text');
  const header = document.getElementById('main-header');
  const appEl  = document.getElementById('app');
  try {
    ltext.textContent = 'Загружаем вопросы…';
    await loadQuestions();
    ltext.textContent = 'Синхронизируем прогресс…';
    Store.load();
    await new Promise(r => Store.loadFromCloud(r));
    loader.style.opacity = '0';
    setTimeout(() => {
      loader.style.display = 'none';
      header.style.visibility = '';
      appEl.style.visibility = '';
      App.renderHome();
    }, 350);
  } catch(e) {
    ltext.innerHTML = '⚠️ Ошибка загрузки<br><small style="color:#888">' + e.message + '</small><br><br>'
      + '<button onclick="boot()" style="padding:10px 20px;border-radius:8px;background:#6ba4ff;color:#fff;border:none;font-size:14px;cursor:pointer;">Повторить</button>';
  }
}
boot();
