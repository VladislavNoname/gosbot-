/* ── Таймер экзамена ──────────────────────────────────────── */
let _examTimerInterval = null;
let _homeTimerInterval = null;  // тикающий таймер карточки «Продолжить экзамен» на главной
const EXAM_DURATION_MS = 3600000;  // 1 час

function _fmtTimer(ms) {
  const total = Math.max(0, Math.floor(ms / 1000));
  const m = Math.floor(total / 60);
  const s = total % 60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

/**
 * Считает оставшееся время экзамена с учётом паузы.
 *
 * Модель lastMode.exam:
 *   - startedAt:   ms (когда стартовал в первый раз, для совместимости)
 *   - remainingMs: остаток времени на момент последней остановки/возобновления.
 *                  Если нет — вычисляем из startedAt (старый формат, без паузы).
 *   - paused:      true → таймер на паузе, считается от remainingMs (фиксированный)
 *                  false/undefined → таймер идёт, надо вычесть (now - resumedAt)
 *   - resumedAt:   ms момента последнего возобновления (или старта)
 *                  Если нет — используем startedAt.
 */
function examRemainingMs(lm) {
  if (!lm || lm.type !== 'exam') return 0;
  // Если есть новая модель — используем её
  if (typeof lm.remainingMs === 'number') {
    if (lm.paused) return Math.max(0, lm.remainingMs);
    const resumedAt = lm.resumedAt || lm.startedAt || Date.now();
    return Math.max(0, lm.remainingMs - (Date.now() - resumedAt));
  }
  // Совместимость со старым форматом без паузы: считаем от startedAt
  if (lm.startedAt) {
    return Math.max(0, EXAM_DURATION_MS - (Date.now() - lm.startedAt));
  }
  return 0;
}

/** Поставить таймер экзамена на паузу. Обновляет lastMode и сохраняет. */
function pauseExamTimer() {
  const lm = Store.data.lastMode;
  if (!lm || lm.type !== 'exam' || lm.paused) return;
  const remaining = examRemainingMs(lm);
  Store.setLastMode({
    ...lm,
    remainingMs: remaining,
    paused:      true,
    pausedAt:    Date.now(),
    ts:          Date.now(),
  });
  clearExamTimer();
  console.log('[exam] таймер поставлен на паузу, осталось:', _fmtTimer(remaining));
}

/** Снять таймер экзамена с паузы. Обновляет lastMode и запускает интервал. */
function resumeExamTimer() {
  const lm = Store.data.lastMode;
  if (!lm || lm.type !== 'exam') return;
  // Если был на паузе — продолжаем с зафиксированного остатка
  // Если не был на паузе (старый формат или первый запуск) — берём текущий остаток
  const remaining = examRemainingMs(lm);
  Store.setLastMode({
    ...lm,
    remainingMs: remaining,
    paused:      false,
    resumedAt:   Date.now(),
    ts:          Date.now(),
  });
  startExamTimer();
  console.log('[exam] таймер возобновлён, осталось:', _fmtTimer(remaining));
}

function startExamTimer(/* legacy startedAt — игнорируется, читаем lastMode */) {
  clearExamTimer();
  _examTimerInterval = setInterval(() => {
    const el = document.getElementById('exam-timer');
    if (!el) return;
    const remaining = examRemainingMs(Store.data.lastMode);
    el.textContent = '⏱ ' + _fmtTimer(remaining);
    el.style.color = remaining < 300000 ? 'var(--wrong,#e74c3c)' : '';
    if (remaining <= 0) {
      clearExamTimer();
      if (Session.s && Session.s.kind === 'exam') Session.finishExam();
    }
  }, 1000);
}

function clearExamTimer() {
  if (_examTimerInterval) { clearInterval(_examTimerInterval); _examTimerInterval = null; }
}

// План экзамена: разделы в фиксированном порядке + сколько случайных вопросов
// берём из каждого. Вопросы ВНУТРИ раздела случайны, но позиции в экзамене
// закреплены за разделами:
//   1-7   — раздел 1 (АРХИТЕКТУРА ПРЕДПРИЯТИЯ)
//   8-27  — раздел 2 (БУСЛАЕВА)
//   28-34 — раздел 3 (ЭЛЕКТРОННЫЙ БИЗНЕС)
//   35-40 — раздел 6 (ИНВЕСТИЦИИ И ИНВЕСТИЦИОННЫЙ АНАЛИЗ)
// Сумма count = 40.
const EXAM_SECTION_PLAN = [
  { section: 1, count: 7  },
  { section: 2, count: 20 },
  { section: 3, count: 7  },
  { section: 6, count: 6  },
];

/**
 * Выбрать qid для нового экзамена по разделам (см. EXAM_SECTION_PLAN).
 * Внутри каждого раздела вопросы случайны; разделы идут строго в порядке плана.
 * Уникальность между экзаменами: исключаем qid, уже попадавшие в прошлые
 * экзамены (Store.data.examUsed). Если в каком-то разделе оставшихся вопросов
 * меньше нужного — сбрасываем пул ИМЕННО этого раздела (убираем его qid из
 * examUsed) и берём из полного набора раздела заново.
 * Возвращает массив qid (обычно длины 40, меньше — только если вопросов в
 * каком-то разделе физически не хватает).
 */
function _pickExamIds() {
  const used = new Set(Store.data.examUsed || []);
  let usedChanged = false;
  const result = [];

  for (const { section, count } of EXAM_SECTION_PLAN) {
    const sectionIds = QUESTIONS.filter(q => q.section === section).map(q => q.id);
    let avail = sectionIds.filter(id => !used.has(id));
    if (avail.length < count) {
      // Пул раздела исчерпан — освобождаем его qid и берём заново из полного набора.
      for (const id of sectionIds) used.delete(id);
      usedChanged = true;
      avail = sectionIds.slice();
    }
    result.push(...shuffle(avail).slice(0, Math.min(count, avail.length)));
  }

  if (usedChanged) {
    // Сохраняем обновлённый examUsed (в cloud sync пойдёт актуальный массив).
    Store.data.examUsed = Array.from(used);
    Store.save();
  }
  return result;
}

const Mode = {
  // Марафон вопросов: СТАТИЧНЫЙ порядок (не перемешивается при каждом входе).
  // Порядок генерируется один раз (Store.data.marathonOrder) и переиспользуется,
  // пока не изменился набор вопросов или пользователь явно не очистил марафон.
  _firstUnanswered(order) {
    // Используется только для марафона (Mode.startAll) → scope='marathon'
    for (let i = 0; i < order.length; i++) {
      if (!Store.getAnswer(order[i], 'marathon')) return i;
    }
    return 0;
  },

  // Возвращает стабильный порядок марафона. Создаёт и сохраняет его при первом
  // обращении; пересоздаёт только если набор вопросов не совпадает с сохранённым
  // (например, добавили/убрали вопросы) — иначе всегда отдаёт один и тот же порядок.
  _marathonOrder() {
    const ids   = QUESTIONS.map(q => q.id);
    const covers = (arr) => Array.isArray(arr) && arr.length === ids.length &&
                  (() => { const s = new Set(arr); return ids.every(id => s.has(id)); })();

    // 1) Уже есть сохранённый стабильный порядок — используем его.
    if (covers(Store.data.marathonOrder)) return Store.data.marathonOrder.slice();

    // 2) Бесшовная миграция: у существующих пользователей порядок марафона лежал
    //    в lastMode.order. Если он покрывает текущий набор вопросов — принимаем его
    //    как стабильный (чтобы человек продолжил ровно ту же последовательность).
    const lm = Store.data.lastMode;
    if (lm && lm.type === 'all' && covers(lm.order)) {
      Store.data.marathonOrder = lm.order.slice();
      Store.save();
      return Store.data.marathonOrder.slice();
    }

    // 3) Иначе — генерируем новый порядок один раз и фиксируем.
    const order = shuffle(ids);
    Store.data.marathonOrder = order;
    Store.save();
    return order.slice();
  },

  // Удалить ответы марафона, ПОРЯДОК СОХРАНЯЕТСЯ. После этого марафон начинается
  // заново по той же последовательности (с первого вопроса).
  async deleteMarathonAnswers() {
    const ids = QUESTIONS.map(q => q.id);
    await Store.resetSubsetWithCloud(ids, 'marathon');  // обнуляет ответы (локально+облако)
    // marathonOrder НЕ трогаем — порядок остаётся прежним.
    Store.clearLastMode();   // сбрасывает позицию (вход начнётся с первого вопроса)
  },

  // Перемешать вопросы: НОВЫЙ порядок, ответы СОХРАНЯЮТСЯ. Новый порядок фиксируется
  // и используется при последующих входах (всё сохраняется в облако).
  reshuffleMarathon() {
    const ids = QUESTIONS.map(q => q.id);
    const order = shuffle(ids);
    Store.data.marathonOrder = order;
    // Позицию приведём к новому порядку при старте (первый неотвеченный) —
    // ответы при этом сохранены. lastMode обновится на новый порядок.
    const lm = Store.data.lastMode;
    if (lm && lm.type === 'all') { lm.order = order.slice(); lm.currentIndex = 0; lm.ts = Date.now(); }
    Store.save();  // сохраняет новый порядок (и lastMode) в облако
  },

  startAll() {
    // Стабильный порядок (без перемешивания при входе). Заходим на первый
    // неотвеченный вопрос, чтобы продолжать с места, не меняя порядок.
    const order = this._marathonOrder();
    Session.start({
      kind: 'practice',
      title: 'Марафон вопросов',
      order,
      currentIndex: this._firstUnanswered(order),
      saveAsLastMode: 'all',
      scope: 'marathon',
    });
  },

  resumeAll() {
    const order = this._marathonOrder();
    const lm = Store.data.lastMode;
    let startIdx = (lm && lm.type === 'all') ? (lm.currentIndex || 0) : 0;
    // Ищем первый неотвеченный начиная с сохранённой позиции
    for (let i = startIdx; i < order.length; i++) {
      if (!Store.getAnswer(order[i], 'marathon')) { startIdx = i; break; }
    }
    Session.start({
      kind: 'practice',
      title: 'Марафон вопросов',
      order,
      currentIndex: startIdx,
      saveAsLastMode: 'all',
      scope: 'marathon',
    });
  },

  // Экзамен: 40 случайных, проверка в конце.
  // Поддержка паузы: lastMode.paused=true → таймер заморожен на lastMode.remainingMs.
  // При продолжении (нажатии "Продолжить") — снимаем паузу.
  startExam() {
    clearExamTimer();
    const lm = Store.data.lastMode;
    const isActiveExam = lm && lm.type === 'exam' && lm.order && lm.startedAt;
    // Защита: если этот started_at уже в списке финализированных — игнорируем
    if (isActiveExam && isFinalizedExam(lm.startedAt)) {
      console.log('[Mode.startExam] lastMode указывает на завершённый экзамен, чистим');
      Store.clearLastMode();
    } else if (isActiveExam) {
      const remaining = examRemainingMs(lm);
      if (remaining > 0) {
        // Продолжаем существующий экзамен.
        // Если был на паузе — снимаем паузу (таймер пойдёт от текущего момента).
        if (lm.paused) {
          resumeExamTimer();
        }
        Session.start({ kind: 'exam', title: 'Экзамен из 40 случайных вопросов',
          order: lm.order, currentIndex: lm.currentIndex || 0,
          startedAt: lm.startedAt, saveAsLastMode: 'exam',
          examAnswers: lm.attemptAnswers || {} });
        // Если паузу не снимали (она уже была снята), стартовый таймер всё равно нужен
        if (!_examTimerInterval) startExamTimer();
        return;
      }
      // Время вышло — сбрасываем и начинаем новый
      Store.clearLastMode();
    }
    // Новый экзамен: фиксируем startedAt и lastMode СРАЗУ — таймер сразу тикает.
    // remainingMs/resumedAt дают точку отсчёта, paused=false — таймер активен.
    //
    // Вопросы набираются по разделам (см. EXAM_SECTION_PLAN / _pickExamIds):
    // 7 из «Архитектуры», 20 из «Буслаевой», 7 из «Электронного бизнеса»,
    // 6 из «Инвестиций» — внутри раздела случайно, разделы идут по порядку.
    // Уникальность между экзаменами учитывается отдельно по каждому разделу.
    const ids = _pickExamIds();
    const startedAt = Date.now();
    Store.setLastMode({
      type:           'exam',
      currentIndex:   0,
      order:          ids,
      startedAt,
      resumedAt:      startedAt,
      remainingMs:    EXAM_DURATION_MS,
      paused:         false,
      attemptAnswers: {},
      ts:             startedAt,
    });
    Session.start({ kind: 'exam', title: 'Экзамен из 40 случайных вопросов',
      order: ids, currentIndex: 0, startedAt, saveAsLastMode: 'exam',
      examAnswers: {} });
    startExamTimer();
  },

  // Произвольный сабсет — режим практики
  // freshStart=true → режим ошибок (без перемешивания/сохранения lastMode)
  // orderScopes — массив scope для каждого id в order (нужен в режиме ошибок,
  //    где вопросы могут быть из разных пулов; при ответе пишем в исходный).
  //    Если orderScopes не передан — все вопросы пишутся в session.scope (default 'section').
  startSubset(questions, title, freshStart = false, orderScopes = null) {
    if (freshStart) {
      // Работа над ошибками — без перемешивания, без сохранения
      Session.start({
        kind: 'practice', title,
        order: questions.map(q => q.id), currentIndex: 0,
        freshStart,
        scope: 'section',  // дефолт для случая когда orderScopes не задан
        orderScopes: orderScopes,
      });
      return;
    }
    // Разделы/темы — перемешать. Восстановить если уже отвечали на этот раздел.
    // ВАЖНО: проверяем Store.getAnswer(id, 'section') — пул разделов.
    const lm = Store.data.lastMode;
    const sameSubset = lm && lm.type === 'subset' && lm.title === title &&
      lm.order && lm.order.some(id => Store.getAnswer(id, 'section'));
    if (sameSubset) {
      let startIdx = lm.currentIndex || 0;
      for (let i = lm.currentIndex || 0; i < lm.order.length; i++) {
        if (!Store.getAnswer(lm.order[i], 'section')) { startIdx = i; break; }
      }
      Session.start({
        kind: 'practice', title, order: lm.order, currentIndex: startIdx,
        saveAsLastMode: 'subset', subsetTitle: title, scope: 'section',
      });
    } else {
      const order = shuffle(questions.map(q => q.id));
      Session.start({
        kind: 'practice', title, order, currentIndex: 0,
        saveAsLastMode: 'subset', subsetTitle: title, scope: 'section',
      });
    }
  },
};

/* =========================================================
   Сессия (одна за раз)
   ========================================================= */
const Session = {
  s: null,             // объект сессии
  // временное состояние внутри текущего вопроса
  ui: null,

  start(session) {
    this.s = session;
    this.ui = null;
    this._renderedIndex = undefined;   // новая сессия → первый кадр прокручиваем наверх
    // Запускаем таймер сразу при старте/восстановлении экзамена
    if (session.kind === 'exam' && session.startedAt) {
      startExamTimer(session.startedAt);
    } else {
      clearExamTimer();
    }
    this.renderCurrent();
  },

  currentQuestion() {
    const id = this.s.order[this.s.currentIndex];
    return getQuestion(id);
  },

  // Восстановить состояние UI вопроса по сохранённому ответу
  uiFromStored(q, stored) {
    const ui = { checked: true, status: stored.status };
    if (q.type === 'sequence') {
      ui.type = 'sequence';
      ui.order = Array.isArray(stored.given) ? stored.given.slice() : q.sequence.map(s => s.text);
      const correctOrder = q.sequence.map(s => s.text);
      ui.correctnessByIndex = ui.order.map((t, i) => t === correctOrder[i]);
    } else if (q.type === 'multi' || q.type === 'multiple') {
      ui.type = 'multi';
      const givenTexts = new Set(Array.isArray(stored.given) ? stored.given : []);
      ui.chosen = new Set();
      q.options.forEach((o, i) => { if (givenTexts.has(o.text)) ui.chosen.add(i); });
    } else {
      ui.type = 'single';
      ui.chosen = typeof stored.given === 'number' ? stored.given : null;
    }
    return ui;
  },

  goNext() {
    if (this.s.currentIndex < this.s.order.length - 1) {
      this.s.currentIndex++;
      this.persistLast();
      this.ui = null;
      this.renderCurrent();
    } else {
      // достигли конца
      if (this.s.kind === 'exam') {
        this.finishExam();
      } else {
        this.renderPracticeEnd();
      }
    }
  },

  goPrev() {
    if (this.s.currentIndex > 0) {
      this.s.currentIndex--;
      this.persistLast();
      this.ui = null;
      this.renderCurrent();
    }
  },

  jumpTo(idx) {
    if (idx < 0 || idx >= this.s.order.length) return;
    this.s.currentIndex = idx;
    this.persistLast();
    this.ui = null;
    this.renderCurrent();
  },

  // Проверяет, есть ли хотя бы один сохранённый ответ среди вопросов сессии.
  // Для экзамена смотрим в s.examAnswers (изолированные ответы попытки),
  // а не в глобальный Store.
  _hasAnyAnswerInSession() {
    if (!this.s || !this.s.order) return false;
    if (this.s.kind === 'exam') {
      const ea = this.s.examAnswers || {};
      return Object.keys(ea).length > 0;
    }
    // practice
    const _scope = this.s.scope || 'marathon';
    const _isSessionScoped = this.s.noRecord || _scope === 'exam_mistakes';
    if (_isSessionScoped) {
      const sa = this.s.sessionAnswers || {};
      return Object.keys(sa).length > 0;
    }
    for (let i = 0; i < this.s.order.length; i++) {
      const qid = this.s.order[i];
      if (Store.getAnswer(qid, _scope)) return true;
    }
    return false;
  },

  persistLast() {
    // В режимах all/subset сохраняем lastMode только когда уже есть
    // хотя бы один ответ — это даёт «свежее перемешивание» при каждом входе
    // до первого ответа.
    if (this.s.saveAsLastMode === 'all') {
      if (!this._hasAnyAnswerInSession()) return;
      Store.setLastMode({ type: 'all', currentIndex: this.s.currentIndex, order: this.s.order, ts: Date.now() });
    } else if (this.s.saveAsLastMode === 'exam') {
      // Экзамен: lastMode уже создан при startExam(). При обновлении сохраняем
      // поля паузы (paused, remainingMs, resumedAt, pausedAt) — иначе сброс ответа
      // снимет паузу неявно. Берём их из текущего lastMode, либо подразумеваем
      // "идущий с нормальным таймером".
      const prev = Store.data.lastMode || {};
      const startedAt = this.s.startedAt;
      Store.setLastMode({
        type:           'exam',
        currentIndex:   this.s.currentIndex,
        order:          this.s.order,
        startedAt,
        // Поля паузы (берём из предыдущего lastMode, если есть)
        paused:         prev.paused || false,
        remainingMs:    typeof prev.remainingMs === 'number' ? prev.remainingMs : EXAM_DURATION_MS,
        resumedAt:      prev.resumedAt || startedAt,
        pausedAt:       prev.pausedAt,
        attemptAnswers: this.s.examAnswers || {},
        ts:             Date.now(),
      });
      // Запускаем таймер только если экзамен НЕ на паузе
      if (!_examTimerInterval && !prev.paused) startExamTimer();
    } else if (this.s.saveAsLastMode === 'subset') {
      if (!this._hasAnyAnswerInSession()) return;
      Store.setLastMode({ type: 'subset', title: this.s.subsetTitle, currentIndex: this.s.currentIndex, order: this.s.order, ts: Date.now() });
    }
  },

  renderCurrent() {
    const q = this.currentQuestion();
    App.topMeta.textContent = `${this.s.title} · ${this.s.currentIndex + 1} / ${this.s.order.length}`;

    // Сохраняем позицию прокрутки СТРАНИЦЫ. Экран перерисовывается целиком при
    // любом действии (выбор варианта, «Проверить», «Дальше»/«Назад», палитра),
    // и без этого страница каждый раз прыгала наверх. Сохраняем скролл при любой
    // перерисовке внутри сессии; наверх уходим только при ПЕРВОМ кадре сессии
    // (новый вопросник — логично показать с начала).
    const _scroller = document.scrollingElement || document.documentElement;
    const _prevScroll = _scroller ? _scroller.scrollTop : 0;
    const _firstRender = (this._renderedIndex === undefined);
    this._renderedIndex = this.s.currentIndex;

    // Восстановление UI при возврате «Назад» или перезагрузке страницы.
    //   • Экзамен: восстанавливаем ТОЛЬКО из изолированных ответов текущей
    //     попытки (s.examAnswers). Глобальный Store.data.answers НЕ трогаем,
    //     иначе ответы из марафона/разделов «протекли» бы в экзамен и
    //     пометили вопросы как отвеченные.
    //   • Practice (марафон/разделы): восстанавливаем из Store.getAnswer,
    //     как и раньше.
    // Восстановление UI происходит даже при freshStart — потому что в режимах
    // "Работа над ошибками" и "Разбор ошибок экзамена" мы храним ответы СЕССИИ
    // локально (this.s.sessionAnswers). Это даёт правильную подсветку при
    // перелистывании назад / в палитре, без записи в персистентные пулы.
    if (!this.ui) {
      let stored = null;
      if (this.s.kind === 'exam') {
        stored = this.s.examAnswers && this.s.examAnswers[q.id];
      } else {
        const scope = this.s.scope || 'marathon';
        const isSessionScoped = this.s.noRecord || scope === 'exam_mistakes';
        if (isSessionScoped) {
          // Локальные ответы текущей сессии
          stored = this.s.sessionAnswers && this.s.sessionAnswers[q.id];
        } else if (!this.s.freshStart) {
          // Обычные practice-режимы (марафон/раздел) — из персистентного Store
          stored = Store.getAnswer(q.id, scope);
        }
      }
      if (stored) this.ui = this.uiFromStored(q, stored);
    }

    App.root.innerHTML = '';
    // Верхняя панель: для экзамена — умная кнопка «Меню» (диалог если есть ответы),
    // и таймер. Для остальных режимов — обычная кнопка и метаданные темы.
    const isExam = this.s.kind === 'exam';
    const _isMarathon = !isExam && !this.s.noRecord && !this.s.freshStart &&
                        this.s.scope === 'marathon';
    const headerLeft = isExam
      ? el('button', { class: 'btn-ghost', onclick: () => this.handleExitExam() }, '← Меню')
      : el('button', { class: 'btn-ghost', onclick: () => App.goHome() }, '← Меню');
    let headerRight;
    if (isExam) {
      headerRight = el('span', { id: 'exam-timer', style: 'font-size:14px;font-weight:600;' },
          '⏱ ' + _fmtTimer(examRemainingMs(Store.data.lastMode)));
    } else {
      headerRight = el('div', { class: 'muted small' }, q.topic ? `${q.topic}. ${q.topic_title}` : (q.section_title || ''));
    }
    App.root.appendChild(el('div', { class: 'row between' }, headerLeft, headerRight));

    // Марафон: две кнопки сверху — «Удалить ответы» (порядок сохраняется) и
    // «Перемешать» (новый порядок, ответы сохраняются). Всё в реальном времени.
    if (_isMarathon) {
      const ids = QUESTIONS.map(qq => qq.id);
      const toolbar = el('div', { class: 'row', style: 'gap:8px;margin-top:10px;' },
        el('button', {
          class: 'btn-ghost small',
          style: 'flex:1;padding:8px 10px;font-size:13px;line-height:1;border-radius:8px;',
          title: 'Обнулить ответы марафона (порядок сохранится)',
          onclick: async () => {
            const answered = ids.filter(id => Store.getAnswer(id, 'marathon')).length;
            if (!confirm(
              `Удалить все ответы марафона?\n\n` +
              `Будет обнулено ${answered} ответов. Порядок вопросов сохранится.\n` +
              `Разделы, экзамены и работа над ошибками не затрагиваются.`
            )) return;
            await Mode.deleteMarathonAnswers();
            haptic.success();
            Mode.startAll();   // тот же порядок, с первого вопроса
          },
        }, '🗑 Удалить ответы'),
        el('button', {
          class: 'btn-ghost small',
          style: 'flex:1;padding:8px 10px;font-size:13px;line-height:1;border-radius:8px;',
          title: 'Перемешать вопросы (ответы сохранятся)',
          onclick: () => {
            if (!confirm(
              `Перемешать вопросы марафона?\n\n` +
              `Порядок изменится, а ответы сохранятся.`
            )) return;
            Mode.reshuffleMarathon();
            haptic.success();
            Mode.startAll();   // новый порядок, продолжаем с первого неотвеченного
          },
        }, '🔀 Перемешать'),
      );
      App.root.appendChild(toolbar);
    }

    // Прогресс-бар по сессии
    const progress = Math.round((this.s.currentIndex + 1) / this.s.order.length * 100);
    App.root.appendChild(el('div', { class: 'progress', style: 'margin:14px 0;' },
      el('div', { class: 'progress-fill', style: `width:${progress}%` })
    ));

    // Палитра вопросов (только для practice с >1 вопросом и не слишком длинной сессии)
    if (this.s.kind === 'practice' && this.s.order.length > 1 && this.s.order.length <= 500) {
      const grid = el('div', { class: 'question-grid' });
      const _sessionScope = this.s.scope || 'marathon';
      const _isSessionScoped = this.s.noRecord || _sessionScope === 'exam_mistakes';
      let currentChip = null;
      this.s.order.forEach((qid, idx) => {
        // Для exam_mistakes / noRecord ответы хранятся локально в session,
        // в Store их нет. Для марафона/раздела — наоборот, читаем из Store.
        const a = _isSessionScoped
          ? (this.s.sessionAnswers && this.s.sessionAnswers[qid])
          : Store.getAnswer(qid, _sessionScope);
        const classes = ['q-chip'];
        if (idx === this.s.currentIndex) classes.push('current');
        if (a && a.status === 'correct') classes.push('correct');
        if (a && a.status === 'wrong') classes.push('wrong');
        const chip = el('button', {
          class: classes.join(' '),
          onclick: () => this.jumpTo(idx),
          title: `Вопрос ${idx + 1}`,
        }, String(idx + 1));
        if (idx === this.s.currentIndex) currentChip = chip;
        grid.appendChild(chip);
      });
      App.root.appendChild(grid);
      // Сетка пересоздаётся при каждой перерисовке и иначе скроллится в начало.
      // Прокручиваем к текущему вопросу СИНХРОННО (до отрисовки кадра), иначе
      // на миг виден кадр с прокруткой в начало → мигание. Чтение offsetTop/
      // offsetHeight принудительно считает раскладку, поэтому значения корректны
      // уже сейчас, без requestAnimationFrame.
      if (currentChip) {
        const target = currentChip.offsetTop
                      - (grid.clientHeight - currentChip.offsetHeight) / 2;
        const maxScroll = grid.scrollHeight - grid.clientHeight;
        grid.scrollTop = Math.max(0, Math.min(target, maxScroll));
      }
    }

    // Карточка вопроса
    App.root.appendChild(this.renderQuestionCard(q));

    // Навигация
    const nav = el('div', { class: 'nav-bar' });
    nav.appendChild(el('button', {
      onclick: () => this.goPrev(),
      disabled: this.s.currentIndex === 0,
    }, '← Назад'));

    nav.appendChild(el('div', { class: 'spacer' }));

    // Одна основная кнопка: пока не проверили — «Проверить»,
    // после проверки — «Дальше →» (или «Завершить» на последнем вопросе).
    const checked = this.ui && this.ui.checked;
    const isLast = this.s.currentIndex === this.s.order.length - 1;

    let label, action;
    if (!checked) {
      label = 'Проверить';
      action = () => this.checkPracticeAnswer();
    } else if (isLast) {
      label = this.s.kind === 'exam' ? 'Завершить экзамен' : 'Завершить';
      action = () => {
        if (this.s.kind === 'exam') this.finishExam();
        else this.renderPracticeEnd();
      };
    } else {
      label = 'Дальше →';
      action = () => this.goNext();
    }
    nav.appendChild(el('button', { class: 'btn-primary', onclick: action }, label));

    // Дополнительная кнопка «Пропустить» (только до проверки, не на последнем) —
    // на случай если человек не знает ответа и хочет двигаться дальше
    if (!checked && !isLast) {
      nav.appendChild(el('button', {
        class: 'btn-ghost',
        onclick: () => this.goNext(),
      }, 'Пропустить'));
    }

    App.root.appendChild(nav);

    // Счётчик
    App.root.appendChild(el('div', { class: 'nav-counter', style: 'margin-top:10px;' },
      `Вопрос ${this.s.currentIndex + 1} из ${this.s.order.length}`));

    // Возврат прокрутки страницы (синхронно, до отрисовки кадра — без мигания).
    // Внутри сессии (выбор варианта, «Проверить», «Дальше», «Назад», палитра) —
    // остаёмся на месте. Только первый кадр сессии — наверх, к началу.
    if (_scroller) {
      _scroller.scrollTop = _firstRender ? 0 : _prevScroll;
    }
  },

  renderQuestionCard(q) {
    const card = el('div', { class: 'question-card' });

    // Метаданные / теги
    const meta = el('div', { class: 'question-meta' });
    const tagsLeft = el('div', {});
    if (q.type === 'multi' || q.type === 'multiple') tagsLeft.appendChild(el('span', { class: 'question-tag multi' }, 'несколько ответов'));
    else if (q.type === 'calc') tagsLeft.appendChild(el('span', { class: 'question-tag calc' }, '🔢 расчёт'));
    else if (q.type === 'sequence') tagsLeft.appendChild(el('span', { class: 'question-tag seq' }, 'последовательность'));
    else tagsLeft.appendChild(el('span', { class: 'question-tag' }, 'один ответ'));
    meta.appendChild(tagsLeft);
    // Вместо #id показываем название раздела — пользователю информативнее.
    const sectionLabel = q.section_title
      ? q.section_title
      : (q.section != null ? `Раздел ${q.section}` : '');
    meta.appendChild(el('span', { class: 'muted small', title: `id ${q.id}` }, sectionLabel));
    card.appendChild(meta);

    // Картинка (если будет)
    if (q.image) {
      card.appendChild(el('img', {
        class: 'question-image',
        src: imageUrl(q.image),
        alt: '',
        loading: 'lazy',
      }));
    }

    // Текст вопроса
    card.appendChild(el('div', { class: 'question-text' }, q.text));

    // Варианты — отдельная функция по типу
    if (q.type === 'sequence') {
      card.appendChild(this.renderSequence(q));
    } else if (q.type === 'multi' || q.type === 'multiple') {
      card.appendChild(this.renderMulti(q));
    } else {
      card.appendChild(this.renderSingle(q));
    }

    // Если уже проверили (и в practice, и в exam) — покажем feedback
    if (this.ui && this.ui.checked) {
      const fb = el('div', {
        class: `feedback ${this.ui.status}`
      },
        el('strong', {}, this.ui.status === 'correct' ? '✓ Верно' : '✗ Неверно'),
        this.ui.status === 'wrong' ? el('div', {}, 'Правильный ответ подсвечен зелёным.') : null
      );
      card.appendChild(fb);
      // Решение (для расчётных задач) — показываем ТОЛЬКО при неправильном ответе.
      // Это даёт юзеру шанс самому разобраться, и помогает понять ошибку.
      if (q.solution && this.ui.status === 'wrong') {
        card.appendChild(el('div', { class: 'solution-block' },
          el('strong', {}, '💡 Решение: '),
          q.solution
        ));
      }
    }



    return card;
  },
  renderSingle(q) {
    const wrap = el('div', { class: 'options' });
    if (!this.ui) this.ui = { type: 'single', chosen: null, checked: false };
    // Перемешивать варианты? Не будем, чтобы пользователь мог запомнить расположение
    q.options.forEach((opt, idx) => {
      const classes = ['option'];
      if (this.ui.chosen === idx) classes.push('selected');
      if (this.ui.checked) {
        if (opt.correct) classes.push('correct');
        else if (this.ui.chosen === idx) classes.push('wrong');
      }
      const optEl = el('div', {
        class: classes.join(' '),
        onclick: () => {
          if (this.ui.checked) return;
          this.ui.chosen = idx;
          this.renderCurrent();
        }
      },
        el('div', { class: 'option-marker' }),
        el('div', { class: 'option-text' }, opt.text)
      );
      wrap.appendChild(optEl);
    });
    return wrap;
  },

  /* ---- multi ---- */
  renderMulti(q) {
    const wrap = el('div', { class: 'options' });
    if (!this.ui) this.ui = { type: 'multi', chosen: new Set(), checked: false }; // multi/multiple
    q.options.forEach((opt, idx) => {
      const classes = ['option'];
      const isSel = this.ui.chosen.has(idx);
      if (isSel) classes.push('selected');
      if (this.ui.checked) {
        if (opt.correct) classes.push(isSel ? 'correct' : 'reveal-correct');
        else if (isSel) classes.push('wrong');
      }
      const optEl = el('div', {
        class: classes.join(' '),
        onclick: () => {
          if (this.ui.checked) return;
          if (this.ui.chosen.has(idx)) this.ui.chosen.delete(idx);
          else this.ui.chosen.add(idx);
          this.renderCurrent();
        }
      },
        el('div', { class: 'option-marker square' }),
        el('div', { class: 'option-text' }, opt.text)
      );
      wrap.appendChild(optEl);
    });
    if (!this.ui.checked) {
      wrap.appendChild(el('div', { class: 'muted small', style: 'margin-top:6px;' },
        'Выберите все правильные варианты'));
    }
    return wrap;
  },

  /* ---- sequence (drag&drop + кнопки ↑/↓ для мобильных) ---- */
  renderSequence(q) {
    if (!this.ui) {
      // изначально перемешать
      this.ui = {
        type: 'sequence',
        order: shuffle(q.sequence.map(s => s.text)),
        checked: false,
        correctnessByIndex: null,
      };
    }
    const wrap = el('div', { class: 'sequence-list' });
    const moveItem = (from, to) => {
      if (to < 0 || to >= this.ui.order.length) return;
      const arr = this.ui.order;
      const [m] = arr.splice(from, 1);
      arr.splice(to, 0, m);
      this.renderCurrent();
    };

    this.ui.order.forEach((text, idx) => {
      const classes = ['seq-item'];
      if (this.ui.checked && this.ui.correctnessByIndex) {
        classes.push(this.ui.correctnessByIndex[idx] ? 'correct' : 'wrong');
      }
      const children = [
        el('span', { class: 'seq-handle' }, '⋮⋮'),
        el('span', { class: 'seq-num' }, String(idx + 1)),
        el('span', { class: 'seq-text' }, text),
      ];
      // Кнопки ↑/↓ только пока не проверили
      if (!this.ui.checked) {
        children.push(el('button', {
          class: 'seq-btn',
          onclick: (e) => { e.stopPropagation(); moveItem(idx, idx - 1); },
          disabled: idx === 0,
          title: 'Выше',
        }, '↑'));
        children.push(el('button', {
          class: 'seq-btn',
          onclick: (e) => { e.stopPropagation(); moveItem(idx, idx + 1); },
          disabled: idx === this.ui.order.length - 1,
          title: 'Ниже',
        }, '↓'));
      }
      const item = el('div', {
        class: classes.join(' '),
        draggable: !this.ui.checked,
        dataset: { idx: String(idx) },
      }, ...children);
      if (!this.ui.checked) this.attachDragHandlers(item);
      wrap.appendChild(item);
    });

    if (this.ui.checked) {
      const correctOrder = q.sequence.map(s => s.text);
      wrap.appendChild(el('div', { class: 'solution-block', style: 'margin-top:12px;' },
        el('strong', {}, 'Правильный порядок: '),
        el('ol', { style: 'margin:6px 0 0;padding-left:22px;' },
          ...correctOrder.map(t => el('li', {}, t))
        )
      ));
    } else {
      wrap.appendChild(el('div', { class: 'muted small', style: 'margin-top:6px;' },
        'Перетащите пункты или используйте стрелки ↑↓ чтобы выстроить порядок'));
    }
    return wrap;
  },

  attachDragHandlers(item) {
    item.addEventListener('dragstart', e => {
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', item.dataset.idx);
    });
    item.addEventListener('dragend', () => item.classList.remove('dragging'));
    item.addEventListener('dragover', e => { e.preventDefault(); item.classList.add('drag-over'); });
    item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
    item.addEventListener('drop', e => {
      e.preventDefault();
      item.classList.remove('drag-over');
      const fromIdx = Number(e.dataTransfer.getData('text/plain'));
      const toIdx = Number(item.dataset.idx);
      if (fromIdx === toIdx) return;
      const arr = this.ui.order;
      const [moved] = arr.splice(fromIdx, 1);
      arr.splice(toIdx, 0, moved);
      this.renderCurrent();
    });
  },

  /* ---- проверка ответа в practice ---- */
  checkPracticeAnswer() {
    const q = this.currentQuestion();
    if (!this.ui) return;
    let given, status;
    if (q.type === 'sequence') {
      given = this.ui.order;
      const correctOrder = q.sequence.map(s => s.text);
      status = arraysEqual(given, correctOrder) ? 'correct' : 'wrong';
      this.ui.correctnessByIndex = given.map((t, i) => t === correctOrder[i]);
    } else if (q.type === 'multi' || q.type === 'multiple') {
      if (this.ui.chosen.size === 0) {
        alert('Выберите хотя бы один вариант');
        return;
      }
      const givenTexts = [...this.ui.chosen].map(i => q.options[i].text);
      given = givenTexts;
      const correctSet = new Set(q.options.filter(o => o.correct).map(o => o.text));
      status = setsEqual(correctSet, new Set(givenTexts)) ? 'correct' : 'wrong';
    } else {
      if (this.ui.chosen === null) {
        alert('Выберите вариант ответа');
        return;
      }
      given = this.ui.chosen;
      status = q.options[this.ui.chosen].correct ? 'correct' : 'wrong';
    }
    this.ui.checked = true;
    this.ui.status = status;
    if (this.s.kind === 'exam') {
      // Экзамен: ответы изолированы в s.examAnswers (синхронизируются с lm.attemptAnswers).
      // НЕ копируются в общий Store.data.answers ни при ответе, ни при finishExam.
      if (!this.s.examAnswers) this.s.examAnswers = {};
      this.s.examAnswers[q.id] = { status, given, ts: Date.now() };
      this.persistLast();  // запишет lm.attemptAnswers и обновит сервер
    } else if (this.s.noRecord) {
      // Разбор ошибок экзамена сразу после попытки — UI показываем, в пулы не пишем.
      // Но локально в сессии сохраняем — чтобы UI при перелистывании / финальный
      // экран видели результаты этой сессии.
      if (!this.s.sessionAnswers) this.s.sessionAnswers = {};
      this.s.sessionAnswers[q.id] = { status, given, ts: Date.now() };
    } else {
      // Practice: scope = session.scope (marathon / section / exam_mistakes).
      const scope = this.s.scope || 'marathon';
      if (scope === 'exam_mistakes') {
        // Работа над ошибками.
        // 1) Локально для UI этой сессии — сохраняем (подсветка, палитра, итог "X/N").
        if (!this.s.sessionAnswers) this.s.sessionAnswers = {};
        this.s.sessionAnswers[q.id] = { status, given, ts: Date.now() };
        // 2) Глобальный пул examMistakes (очередь повторения):
        //    - correct → qid УДАЛЯЕТСЯ из ошибок
        //    - wrong   → qid остаётся (надо отработать ещё)
        // 3) Общая статистика (statsStatus) — обновляем ВСЕГДА (последний ответ):
        //    верный ответ здесь → зелёный на главной/в статистике, неверный → красный.
        // marathon/section пулы НЕ трогаем.
        Store.recordStat(q.id, status, given);
        if (status === 'correct') {
          const qidNum = Number(q.id);
          const beforeArr = (Store.data.examMistakes || []).map(Number);
          const setM = new Set(beforeArr);
          const hadIt = setM.has(qidNum);
          setM.delete(qidNum);
          Store.data.examMistakes = Array.from(setM);
          // для обратной совместимости поддерживаем и старый пул examCorrect
          const setC = new Set((Store.data.examCorrect || []).map(Number));
          setC.add(qidNum);
          Store.data.examCorrect = Array.from(setC);
          console.log('[exam_mistakes] resolved qid=' + qidNum,
                      'mistakes before:', beforeArr.length, 'after:', setM.size,
                      'hadIt:', hadIt);
        }
        Store.save();  // → POST /progress с обновлёнными пулами + stats_status
      } else {
        Store.recordAnswer(q.id, status, given, scope);
      }
    }
    this.renderCurrent();
  },

  // Обработка нажатия «← Меню» внутри экзамена.
  // Если ни на один вопрос ещё не ответили — просто ставим на паузу и выходим
  // (это симметрично поведению бота "Сохранить и выйти").
  // Если есть ответы — показываем диалог с выбором: пауза / завершить / отмена.
  handleExitExam() {
    if (!this._hasAnyAnswerInSession()) {
      // Без диалога: ставим на паузу и уходим. Юзер сможет вернуться позже
      // через карточку "Продолжить экзамен" на главной.
      pauseExamTimer();
      App.goHome();
      return;
    }
    this._showExitExamDialog();
  },

  _showExitExamDialog() {
    const overlay = el('div', { class: 'modal-overlay', id: 'exit-exam-modal' });
    const closeIt = () => { try { document.body.removeChild(overlay); } catch (e) {} };
    overlay.addEventListener('click', e => { if (e.target === overlay) closeIt(); });
    const modal = el('div', { class: 'modal' });

    modal.appendChild(el('div', { class: 'modal-header' },
      el('h3', { class: 'modal-title' }, 'Выйти из экзамена?'),
      el('button', { class: 'modal-close', onclick: closeIt, title: 'Закрыть' }, '×')
    ));

    // Покажем оставшееся время в подсказке — чтобы было понятно, сколько уходит на паузу
    const lm = Store.data.lastMode;
    const remaining = examRemainingMs(lm);
    modal.appendChild(el('div', { class: 'modal-hint' },
      `Осталось времени: ${_fmtTimer(remaining)}. Можно поставить таймер на паузу и вернуться позже, ` +
      `или сразу завершить экзамен и посмотреть результат.`
    ));

    const actions = el('div', { class: 'modal-actions', style: 'flex-direction:column;gap:10px;align-items:stretch;' });

    // Сохранить и выйти (пауза) — таймер замирает до возврата
    actions.appendChild(el('button', {
      class: 'btn-primary',
      style: 'width:100%;',
      onclick: () => {
        closeIt();
        pauseExamTimer();   // фиксируем remainingMs и ставим paused=true
        App.goHome();
      }
    }, '⏸ Сохранить и выйти (таймер на паузе)'));

    // Завершить экзамен — посчитать результат и записать в историю
    actions.appendChild(el('button', {
      class: 'btn-danger',
      style: 'width:100%;',
      onclick: () => {
        closeIt();
        this.finishExam();
      }
    }, '🏁 Завершить и посмотреть результат'));

    // Остаться
    actions.appendChild(el('button', {
      style: 'width:100%;',
      onclick: closeIt,
    }, 'Отмена — продолжить решать'));

    modal.appendChild(actions);
    overlay.appendChild(modal);
    document.body.appendChild(overlay);
  },

  finishExam() {
    clearExamTimer();
    // Снимаем startedAt и order ДО очистки lastMode — они нужны для записи в историю
    const startedAt = (Store.data.lastMode && Store.data.lastMode.startedAt)
                    || this.s.startedAt
                    || Date.now();

    // Помечаем этот started_at как "финализированный" — чтобы при возможной
    // расовой синхронизации с сервером (если придёт устаревший last_mode с тем же
    // started_at) мы могли его распознать и не открыть завершённый экзамен заново.
    try {
      const raw = localStorage.getItem('gosexam_finalized_exams_v1') || '[]';
      const finalized = JSON.parse(raw);
      if (!finalized.includes(startedAt)) {
        finalized.push(startedAt);
        // Храним только последние 20, чтобы не разрастался
        while (finalized.length > 20) finalized.shift();
        localStorage.setItem('gosexam_finalized_exams_v1', JSON.stringify(finalized));
      }
    } catch (e) {}

    Store.clearLastMode();  // сбрасываем сохранённый экзамен после завершения

    // Изолированные ответы текущей попытки (могут отсутствовать, если время вышло
    // и пользователь не успел ответить).
    const examAnswers = this.s.examAnswers || {};

    const results = [];
    let correctCount = 0;
    // Разбивка по разделам: {sectionNumber: {title, total, correct, wrong}}
    const sectionsStats = {};
    for (const qid of this.s.order) {
      const q = getQuestion(qid);
      const stored = examAnswers[qid];        // ← ответы ТОЛЬКО этой попытки
      const given  = stored ? stored.given  : null;
      const status = stored ? stored.status : 'wrong'; // без ответа = неверно
      if (status === 'correct') correctCount++;
      results.push({ q, given, status, answered: !!stored });

      // Копим статистику по разделу
      const sNum   = q && q.section != null ? q.section : 0;
      const sTitle = (q && q.section_title) || `Раздел ${sNum}`;
      if (!sectionsStats[sNum]) sectionsStats[sNum] = { number: sNum, title: sTitle, total: 0, correct: 0, wrong: 0 };
      sectionsStats[sNum].total++;
      if (status === 'correct') sectionsStats[sNum].correct++;
      else sectionsStats[sNum].wrong++;
    }

    // Пополняем три пула по вопросам этой попытки:
    //   1) examUsed     — все qid попытки (для уникальности следующих экзаменов)
    //   2) examCorrect  — qid, отвеченные ПРАВИЛЬНО (влияют на «Изучено %»)
    //   3) examMistakes — qid, отвеченные НЕПРАВИЛЬНО (идут в «Работу над ошибками»)
    // Пустые (неотвеченные) вопросы НЕ считаются ошибкой и НЕ пишутся в «Работу
    // над ошибками» — при выходе/завершении экзамена они просто игнорируются.
    const usedSet    = new Set(Store.data.examUsed || []);
    const mistakeSet = new Set(Store.data.examMistakes || []);
    const correctSet = new Set((Store.data.examCorrect || []).map(Number));
    for (const qid of this.s.order) {
      usedSet.add(qid);
      const stored = examAnswers[qid];
      if (!stored) continue;                 // пустой ответ — пропускаем (не ошибка)
      if (stored.status === 'correct') {
        correctSet.add(Number(qid));
      } else {
        mistakeSet.add(qid);                 // только реально неправильные ответы
      }
      // Общая статистика: фиксируем последний ответ (верно/неверно) с выбором.
      Store.recordStat(qid, stored.status, stored.given);
    }
    Store.data.examUsed     = Array.from(usedSet);
    Store.data.examMistakes = Array.from(mistakeSet);
    Store.data.examCorrect  = Array.from(correctSet);
    Store.save();

    // Пишем попытку в облако (если есть авторизация). Дубль защищён started_at в API.
    try {
      const finishedAt = Date.now();
      const attempt = {
        started_at:  startedAt,
        finished_at: finishedAt,
        total:       results.length,
        correct:     correctCount,
        duration_ms: Math.max(0, finishedAt - startedAt),
        details: {
          sections: Object.values(sectionsStats)
            .sort((a, b) => a.number - b.number),
          // Подробности по каждому вопросу — чтобы потом можно было открыть
          // прошлый экзамен и посмотреть вопросы с пометками. Текст вопросов
          // не храним (подтягиваем из базы по id при просмотре).
          questions: results.map(r => ({
            id:       r.q ? r.q.id : null,
            given:    r.given,
            status:   r.status,
            answered: !!r.answered,
          })),
        },
      };
      saveExamAttempt(attempt);  // fire-and-forget
      ExamHistory.add(attempt);  // локальный кэш
    } catch (e) {
      console.warn('saveExamAttempt failed:', e);
    }

    this.renderExamResults(correctCount, results);
  },

  renderExamResults(correctCount, results) {
    const total = results.length;
    const pct = total ? Math.round(correctCount / total * 100) : 0;
    let grade, gradeClass;
    if (pct >= 85) { grade = 'Отлично'; gradeClass = 'grade-otl'; }
    else if (pct >= 75) { grade = 'Хорошо'; gradeClass = 'grade-hor'; }
    else if (pct >= 60) { grade = 'Удовлетворительно'; gradeClass = 'grade-udov'; }
    else { grade = 'Неудовлетворительно'; gradeClass = 'grade-neud'; }

    App.topMeta.textContent = 'Результаты экзамена';
    App.root.innerHTML = '';
    App.root.appendChild(el('div', { class: 'result-banner' },
      el('div', { class: 'muted' }, 'Ваш результат'),
      el('div', { class: `result-score ${gradeClass}` }, `${correctCount} / ${total}`),
      el('div', { class: `result-grade ${gradeClass}` }, `${pct}% — ${grade}`),
      el('div', { class: 'result-detail' }, 'Шкала: 85% — отлично, 75% — хорошо, 60% — удовл.')
    ));

    App.root.appendChild(el('div', { class: 'nav-bar' },
      el('button', { class: 'btn-primary', onclick: () => Mode.startExam() }, '🔄 Новый экзамен'),
      el('button', { onclick: () => {
        const errorQs = results.filter(r => r.status === 'wrong').map(r => r.q);
        if (errorQs.length === 0) { alert('Ошибок нет!'); return; }
        // freshStart=true → без сохранения lastMode/палитры.
        // noRecord=true → ответы при разборе не пишутся ни в один пул
        // (это разовый разбор для текущей попытки экзамена, не должен
        // влиять на marathon/section статистику).
        Session.start({
          kind: 'practice',
          title: `Ошибки экзамена (${errorQs.length})`,
          order: errorQs.map(q => q.id),
          currentIndex: 0,
          freshStart: true,
          noRecord: true,
        });
      }}, '🔁 Разобрать ошибки'),
      el('div', { class: 'spacer' }),
      el('button', { class: 'btn-ghost', onclick: () => App.goHome() }, '← В меню')
    ));

    // Список вопросов с разбором
    App.root.appendChild(el('h2', {}, 'Подробный разбор'));
    const list = el('div', { class: 'topic-list' });
    results.forEach((r, idx) => list.appendChild(this._resultCard(r, idx)));
    App.root.appendChild(list);
  },

  // Карточка одного вопроса в разборе экзамена.
  //   r = { q, given, status, answered }
  //   • Пропущен (!answered) — НЕ раскрываем правильный ответ, метка «Пропущен».
  //   • Правильно — зелёным правильный, метка «Отвечен правильно».
  //   • Неправильно — красным выбор пользователя + зелёным правильный,
  //     метка «Отвечен неправильно».
  _resultCard(r, idx) {
    const q = r.q;
    const skipped = !r.answered;
    const correct = r.answered && r.status === 'correct';

    let tag, tagBg, tagColor, label, labelColor;
    if (skipped)      { tag = '–'; tagBg = 'var(--bg)';         tagColor = 'var(--muted)';   label = 'Пропущен';            labelColor = 'var(--muted)'; }
    else if (correct) { tag = '✓'; tagBg = 'var(--correct-bg)'; tagColor = 'var(--correct)'; label = 'Отвечен правильно';   labelColor = 'var(--correct)'; }
    else              { tag = '✗'; tagBg = 'var(--wrong-bg)';   tagColor = 'var(--wrong)';   label = 'Отвечен неправильно'; labelColor = 'var(--wrong)'; }

    const card = el('div', { class: 'question-card' });
    card.appendChild(el('div', { class: 'question-meta' },
      el('div', {},
        el('span', { class: 'question-tag', style: `background:${tagBg};color:${tagColor};` }, tag),
        el('span', { class: 'muted small' }, ` Вопрос ${idx + 1}`)
      ),
      el('span', { class: 'muted small', title: q ? `id ${q.id}` : '' },
          q ? (q.section_title || (q.section != null ? `Раздел ${q.section}` : '')) : '')
    ));

    // Подпись-метка статуса
    card.appendChild(el('div', { style: `font-weight:600;font-size:13px;margin:2px 0 8px;color:${labelColor};` }, label));

    if (!q) {
      card.appendChild(el('div', { class: 'muted small' }, 'Вопрос удалён из базы — текст недоступен.'));
      return card;
    }

    if (q.image) {
      card.appendChild(el('img', {
        class: 'question-image', src: imageUrl(q.image), alt: '', loading: 'lazy',
        style: 'max-width:100%;margin-bottom:8px;'
      }));
    }
    card.appendChild(el('div', { class: 'question-text', style: 'font-size:14px;' }, q.text));

    if (q.type === 'sequence') {
      // Пропущенный — порядок не раскрываем.
      if (!skipped) {
        card.appendChild(el('div', { class: 'muted small', style: 'margin-bottom:4px;' }, 'Правильный порядок:'));
        card.appendChild(el('ol', { style: 'margin:0;padding-left:22px;' },
          ...q.sequence.map(s => el('li', {}, s.text))));
      }
    } else if (Array.isArray(q.options)) {
      const opts = el('div', { class: 'options' });
      q.options.forEach((o, oi) => {
        const classes = ['option'];
        if (!skipped) {
          let userPicked = Array.isArray(r.given) ? r.given.includes(o.text) : (r.given === oi);
          if (o.correct) classes.push('reveal-correct');         // правильный — зелёным
          if (userPicked && !o.correct) classes.push('wrong');   // выбор пользователя (неверный) — красным
        }
        opts.appendChild(el('div', { class: classes.join(' ') },
          el('div', { class: 'option-marker' + ((q.type === 'multi' || q.type === 'multiple') ? ' square' : '') }),
          el('div', { class: 'option-text' }, o.text)
        ));
      });
      card.appendChild(opts);
    }

    // Пояснение показываем только для отвеченных (пропущенный не раскрываем).
    if (q.solution && !skipped) {
      card.appendChild(el('div', { class: 'solution-block' }, el('strong', {}, '💡 '), q.solution));
    }
    return card;
  },

  renderPracticeEnd() {
    // Подсчёт по сессии
    const total = this.s.order.length;
    let correctCount = 0, wrongCount = 0, skipped = 0;
    const _sessionScope = this.s.scope || 'marathon';
    const _isSessionScoped = this.s.noRecord || _sessionScope === 'exam_mistakes';
    for (let i = 0; i < this.s.order.length; i++) {
      const qid = this.s.order[i];
      // exam_mistakes / noRecord — ответы только в session.sessionAnswers
      const a = _isSessionScoped
        ? (this.s.sessionAnswers && this.s.sessionAnswers[qid])
        : Store.getAnswer(qid, _sessionScope);
      if (!a) skipped++;
      else if (a.status === 'correct') correctCount++;
      else wrongCount++;
    }
    App.topMeta.textContent = 'Готово';
    App.root.innerHTML = '';
    App.root.appendChild(el('div', { class: 'result-banner' },
      el('div', { class: 'muted' }, this.s.title),
      el('div', { class: 'result-score grade-otl' }, `${correctCount} / ${total}`),
      el('div', { class: 'result-detail' }, `Неверных: ${wrongCount} · Без ответа: ${skipped}`)
    ));
    App.root.appendChild(el('div', { class: 'nav-bar' },
      el('button', { class: 'btn-primary', onclick: () => App.goHome() }, '← В меню'),
      null
    ));
  }
};

/* =========================================================
   Редактор вопроса (модальное окно)
   ========================================================= */
const Editor = {
  open(qid) {
    const original = QUESTIONS_BY_ID.get(qid);
    if (!original) return;
    const current = getQuestion(qid); // с учётом уже существующего оверрайда
    // Делаем глубокую копию полей, которые будем редактировать
    const draft = {
      qid,
      text: current.text,
      type: current.type,
      solution: current.solution || '',
      options: (current.options || []).map(o => ({ text: o.text, correct: o.correct })),
      sequence: current.sequence ? current.sequence.map(s => ({ order: s.order, text: s.text })) : null,
    };
    this.draft = draft;
    this.original = original;
    this.render();
  },

  close() {
    this.draft = null;
    const overlay = document.getElementById('editor-modal');
    if (overlay) overlay.remove();
  },

  render() {
    // Удалить старое, если было
    const old = document.getElementById('editor-modal');
    if (old) old.remove();

    const d = this.draft;
    const overlay = el('div', { class: 'modal-overlay', id: 'editor-modal' });
    overlay.addEventListener('click', e => { if (e.target === overlay) this.close(); });

    const modal = el('div', { class: 'modal' });

    // Header
    modal.appendChild(el('div', { class: 'modal-header' },
      el('h3', { class: 'modal-title' }, `Редактирование вопроса #${d.qid}`),
      el('button', { class: 'modal-close', onclick: () => this.close(), title: 'Закрыть' }, '×')
    ));

    modal.appendChild(el('div', { class: 'modal-hint' },
      'Правки сохраняются только на этом устройстве.'
    ));

    // Текст вопроса
    const textArea = el('textarea', { id: 'edit-text', rows: '3' });
    textArea.value = d.text;
    textArea.addEventListener('input', e => d.text = e.target.value);
    modal.appendChild(el('div', { class: 'modal-section' },
      el('div', { class: 'modal-label' }, 'Текст вопроса'),
      textArea,
    ));

    // Варианты или последовательность
    if (d.type === 'sequence') {
      modal.appendChild(this.renderSequenceEditor(d));
    } else {
      modal.appendChild(this.renderOptionsEditor(d));
    }

    // Решение (для расчётных или если уже есть)
    if (d.type === 'calc' || d.solution) {
      const solArea = el('textarea', { rows: '3' });
      solArea.value = d.solution;
      solArea.addEventListener('input', e => d.solution = e.target.value);
      modal.appendChild(el('div', { class: 'modal-section' },
        el('div', { class: 'modal-label' }, 'Решение / пояснение (необязательно)'),
        solArea,
      ));
    }

    // Кнопки действий
    const actions = el('div', { class: 'modal-actions' });
    actions.appendChild(el('button', { onclick: () => this.close() }, 'Отмена'));
    if (Store.getOverride(d.qid)) {
      actions.appendChild(el('button', {
        class: 'btn-danger',
        onclick: () => {
          if (confirm('Откатить правки и вернуть оригинальный вопрос?')) {
            Store.removeOverride(d.qid);
            this.close();
            // Перерисовать текущий экран
            if (Session.s) { Session.ui = null; Session.renderCurrent(); }
          }
        }
      }, 'Откатить к оригиналу'));
    }
    actions.appendChild(el('div', { class: 'spacer' }));
    actions.appendChild(el('button', {
      class: 'btn-primary',
      onclick: () => this.save(),
    }, 'Сохранить'));
    modal.appendChild(actions);

    overlay.appendChild(modal);
    document.body.appendChild(overlay);
  },

  renderOptionsEditor(d) {
    const section = el('div', { class: 'modal-section' });
    section.appendChild(el('div', { class: 'modal-label' },
      (d.type === 'multi' || d.type === 'multiple') ? 'Варианты (нажмите ✓ чтобы отметить правильные — можно несколько)' :
      'Варианты (нажмите ✓ чтобы выбрать правильный)'));

    const list = el('div', {});
    const rerender = () => {
      list.innerHTML = '';
      d.options.forEach((opt, idx) => {
        const item = el('div', { class: 'editor-option' + (opt.correct ? ' is-correct' : '') });
        item.appendChild(el('button', {
          class: 'editor-option-toggle',
          title: opt.correct ? 'Снять отметку правильного' : 'Отметить как правильный',
          onclick: () => {
            if (d.type === 'single' || d.type === 'calc') {
              // single: один правильный — снимаем у всех, ставим у выбранного
              d.options.forEach(o => o.correct = false);
              opt.correct = true;
            } else {
              // multi: переключаем
              opt.correct = !opt.correct;
            }
            rerender();
          },
        }, opt.correct ? '✓' : ''));
        const ta = el('textarea', { rows: '2' });
        ta.value = opt.text;
        ta.addEventListener('input', e => opt.text = e.target.value);
        item.appendChild(ta);
        item.appendChild(el('button', {
          class: 'editor-option-remove',
          title: 'Удалить вариант',
          onclick: () => {
            if (d.options.length <= 2) { alert('Должно быть минимум 2 варианта'); return; }
            d.options.splice(idx, 1);
            rerender();
          }
        }, '×'));
        list.appendChild(item);
      });
      list.appendChild(el('button', {
        class: 'editor-add-opt',
        onclick: () => { d.options.push({ text: '', correct: false }); rerender(); }
      }, '+ Добавить вариант'));
    };
    rerender();
    section.appendChild(list);
    return section;
  },

  renderSequenceEditor(d) {
    const section = el('div', { class: 'modal-section' });
    section.appendChild(el('div', { class: 'modal-label' },
      'Шаги в правильном порядке (сверху — первый)'));

    const list = el('div', {});
    const rerender = () => {
      // нормализуем order
      d.sequence.forEach((s, i) => s.order = i + 1);
      list.innerHTML = '';
      d.sequence.forEach((s, idx) => {
        const item = el('div', { class: 'editor-seq-item' });
        item.appendChild(el('span', { class: 'editor-seq-num' }, String(idx + 1) + '.'));
        const input = el('input', { type: 'text' });
        input.value = s.text;
        input.addEventListener('input', e => s.text = e.target.value);
        item.appendChild(input);
        // up/down/remove
        item.appendChild(el('button', {
          class: 'editor-option-remove',
          title: 'Выше',
          disabled: idx === 0,
          onclick: () => {
            const [m] = d.sequence.splice(idx, 1);
            d.sequence.splice(idx - 1, 0, m);
            rerender();
          }
        }, '↑'));
        item.appendChild(el('button', {
          class: 'editor-option-remove',
          title: 'Ниже',
          disabled: idx === d.sequence.length - 1,
          onclick: () => {
            const [m] = d.sequence.splice(idx, 1);
            d.sequence.splice(idx + 1, 0, m);
            rerender();
          }
        }, '↓'));
        item.appendChild(el('button', {
          class: 'editor-option-remove',
          title: 'Удалить',
          onclick: () => {
            if (d.sequence.length <= 2) { alert('Должно быть минимум 2 шага'); return; }
            d.sequence.splice(idx, 1);
            rerender();
          }
        }, '×'));
        list.appendChild(item);
      });
      list.appendChild(el('button', {
        class: 'editor-add-opt',
        onclick: () => { d.sequence.push({ order: d.sequence.length + 1, text: '' }); rerender(); }
      }, '+ Добавить шаг'));
    };
    rerender();
    section.appendChild(list);
    return section;
  },

  save() {
    const d = this.draft;
    // Валидация
    if (!d.text || d.text.trim().length < 3) {
      alert('Текст вопроса не может быть пустым');
      return;
    }
    if (d.type === 'sequence') {
      if (!d.sequence || d.sequence.length < 2) {
        alert('Должно быть минимум 2 шага');
        return;
      }
      if (d.sequence.some(s => !s.text.trim())) {
        alert('Все шаги должны иметь текст');
        return;
      }
    } else {
      if (!d.options || d.options.length < 1) {
        alert('Должен быть хотя бы один вариант');
        return;
      }
      if (d.options.some(o => !o.text.trim())) {
        alert('Все варианты должны иметь текст');
        return;
      }
      if (!d.options.some(o => o.correct)) {
        alert('Отметьте хотя бы один правильный вариант (кружком ✓ слева)');
        return;
      }
    }

    // Считаем «правкой» только те поля, которые отличаются от оригинала
    const orig = this.original;
    const patch = {};
    if (d.text.trim() !== orig.text) patch.text = d.text.trim();
    if (d.type !== 'sequence') {
      const a = JSON.stringify(orig.options.map(o => ({ text: o.text, correct: o.correct })));
      const b = JSON.stringify(d.options.map(o => ({ text: o.text.trim(), correct: o.correct })));
      if (a !== b) patch.options = d.options.map(o => ({ text: o.text.trim(), correct: o.correct }));
    } else {
      const a = JSON.stringify((orig.sequence || []).map(s => s.text));
      const b = JSON.stringify(d.sequence.map(s => s.text.trim()));
      if (a !== b) {
        patch.sequence = d.sequence.map((s, i) => ({ order: i + 1, text: s.text.trim() }));
      }
    }
    if ((d.solution || '') !== (orig.solution || '')) {
      patch.solution = d.solution.trim();
    }

    if (Object.keys(patch).length === 0) {
      // ничего не изменилось — если был оверрайд, можем его убрать
      if (Store.getOverride(d.qid)) {
        Store.removeOverride(d.qid);
      }
      this.close();
      return;
    }

    Store.setOverride(d.qid, patch);
    // Сбросим сохранённый ответ — правильный мог измениться
    delete Store.data.answers[d.qid];
    Store.save();
    this.close();
    // Перерисовка
    if (Session.s) { Session.ui = null; Session.renderCurrent(); }
    else App.renderHome();
  },
};

/* =========================================================
   Импорт / Экспорт правок
   ========================================================= */
const PatchIO = {
  exportFile() {
    const overrides = Store.getAllOverrides();
    if (Object.keys(overrides).length === 0) {
      alert('Пока нет ни одной правки — нечего экспортировать.');
      return;
    }
    const payload = {
      version: 1,
      generated_at: new Date().toISOString(),
      count: Object.keys(overrides).length,
      overrides,
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const ts = new Date().toISOString().slice(0, 10);
    a.download = `gosexam-правки-${ts}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  },

  importFile() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json,.json';
    input.addEventListener('change', e => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const obj = JSON.parse(ev.target.result);
          // Поддерживаем два формата: {overrides: {...}} или просто {qid: {...}}
          const data = obj.overrides || obj;
          if (typeof data !== 'object' || data === null) {
            alert('Неверный формат файла.');
            return;
          }
          const choice = confirm(
            `Импортировать правки из файла?\n\n` +
            `Найдено правок: ${Object.keys(data).length}\n\n` +
            `OK — добавить к существующим\n` +
            `Отмена — не импортировать`
          );
          if (!choice) return;
          const added = Store.importOverrides(data, 'merge');
          alert(`Импортировано правок: ${added}`);
          App.renderHome();
        } catch (err) {
          alert('Не удалось прочитать файл: ' + err.message);
        }
      };
      reader.readAsText(file);
    });
    input.click();
  },
};

/* API Sync — прогресс через VPS (синхронизация с ботом) */
const API_URL = 'https://gosbot.ddns.net';

function _apiAuth() {
  const user     = tg?.initDataUnsafe?.user;
  const initData = tg?.initData || '';
  if (!user?.id) { console.warn('[API] нет user.id — tg.initDataUnsafe:', tg?.initDataUnsafe); return null; }
  if (!initData)  { console.warn('[API] нет initData'); return null; }
  if (!API_URL.startsWith('https')) { console.warn('[API] URL не HTTPS'); return null; }
  return { userId: user.id, initData };
}

// Универсальная обёртка для API-запросов с логированием
async function _apiFetch(path, options = {}) {
  const auth = _apiAuth();
  if (!auth) return null;
  const url = `${API_URL}${path}`;
  try {
    const r = await fetch(url, {
      ...options,
      headers: {
        ...(options.headers || {}),
        'Authorization': 'TgInitData ' + auth.initData,
      },
    });
    if (!r.ok) {
      console.warn(`[API] ${options.method||'GET'} ${url} → ${r.status}`);
      return null;
    }
    return r;
  } catch(e) {
    console.warn(`[API] ${options.method||'GET'} ${url} → ошибка:`, e.message);
    return null;
  }
}

// Обёртка над Store.save — дополнительно шлём на API (fire-and-forget)
const _saveLocal = Store.save.bind(Store);
Store.save = function() {
  _saveLocal();
  localStorage.setItem('gosexam_last_save_ts', String(Date.now()));
  const auth = _apiAuth();
  if (!auth) return;
  // Сохраняем на сервер — любой ответ игнорируем (fire-and-forget).
  // Шлём ВСЕ поля: марафонский пул, разделовый пул, exam_used (массив, replace),
  // last_mode. Сервер мерджит answers/section_answers по ts, exam_used — replace.
  _apiFetch(`/progress/${auth.userId}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      answers:         Store.data.answers,
      section_answers: Store.data.sectionAnswers || {},
      exam_used:       Store.data.examUsed || [],
      exam_mistakes:   Store.data.examMistakes || [],
      exam_correct:    Store.data.examCorrect || [],
      stats_status:    Store.data.statsStatus || {},
      last_mode:       Store.data.lastMode || null,
    }),
  });
};

// Загрузка прогресса с API при старте (мерж с localStorage)
Store.loadFromCloud = async function(cb) {
  try {
    const auth = _apiAuth();
    if (!auth) { cb(); return; }

    const r = await _apiFetch(`/progress/${auth.userId}`);
    if (!r) { cb(); return; }

    const data = await r.json();
    const resetAt      = data.reset_at || 0;
    // Надёжное определение сброса: сравниваем reset_at с последним обработанным
    // Не зависит от часового пояса, работает всегда
    const lastResetAt  = parseInt(localStorage.getItem('gosexam_last_reset_at') || '0');
    const isNewReset   = resetAt > 0 && resetAt !== lastResetAt;

    if (isNewReset) {
      Store.data = {
        answers: {}, sectionAnswers: {}, examUsed: [], examMistakes: [],
        examCorrect: [], marathonOrder: null, statsStatus: {},
        lastMode: null, overrides: Store.data.overrides || {},
      };
      _saveLocal();
      localStorage.setItem('gosexam_last_reset_at', String(resetAt));
      localStorage.removeItem('gosexam_last_save_ts');
      console.log('[API] прогресс сброшен, reset_at=' + resetAt);
    } else {
      // Мерж marathon: обе стороны, побеждает более новый ts
      const merged = { ...(Store.data.answers || {}) };
      for (const [id, v] of Object.entries(data.answers || {})) {
        const loc = merged[id];
        if (!loc || (v.ts||0) >= (loc.ts||0)) merged[id] = v;
      }
      Store.data.answers = merged;

      // Мерж section: аналогично
      const mergedSec = { ...(Store.data.sectionAnswers || {}) };
      for (const [id, v] of Object.entries(data.section_answers || {})) {
        const loc = mergedSec[id];
        if (!loc || (v.ts||0) >= (loc.ts||0)) mergedSec[id] = v;
      }
      Store.data.sectionAnswers = mergedSec;

      // exam_used: REPLACE из облака (сервер — источник истины).
      // Используем union чтобы в worst case не потерять ничего при гонке двух устройств.
      const usedSet = new Set([...(Store.data.examUsed || []), ...(data.exam_used || [])]);
      Store.data.examUsed = Array.from(usedSet);

      // exam_correct: union (правильные ответы экзаменов только накапливаются,
      // чистятся лишь полным сбросом). Нормализуем к Number для единообразия.
      const correctSet = new Set([
        ...(Store.data.examCorrect || []).map(Number),
        ...((data.exam_correct || []).map(Number)),
      ]);
      Store.data.examCorrect = Array.from(correctSet);

      // stats_status: МЕРЖ по ts (последний ответ побеждает), как answers.
      // Отдельный пул общей статистики — не зависит от сбросов режимов.
      const mergedStats = { ...(Store.data.statsStatus || {}) };
      for (const [id, v] of Object.entries(data.stats_status || {})) {
        const loc = mergedStats[id];
        if (!loc || (v.ts || 0) >= (loc.ts || 0)) mergedStats[id] = v;
      }
      Store.data.statsStatus = mergedStats;

      // exam_mistakes: используем СЕРВЕРНУЮ версию как авторитативную.
      // Это критично для исправления: если юзер на устройстве A исправил qid
      // (qid удалён из локального examMistakes, ушёл на сервер) — устройство B
      // не должно его реанимировать через union. Поэтому REPLACE.
      // ВАЖНО: нормализуем элементы к Number — иначе Set.delete не сработает
      // если в сервере вдруг строки (страховка от старых записей).
      Store.data.examMistakes = Array.isArray(data.exam_mistakes)
        ? data.exam_mistakes.map(Number)
        : (Store.data.examMistakes || []);

      // last_mode: облако — источник истины.
      // Если сервер вернул last_mode=null (например, после завершения экзамена на другом
      // устройстве) — мы тоже зануляем локальный. Иначе берём по более новому ts.
      const apiLm = data.last_mode || null;
      const locLm = Store.data.lastMode || null;
      if (apiLm === null) {
        Store.data.lastMode = null;
      } else if (apiLm.type === 'exam' && isFinalizedExam(apiLm.startedAt)) {
        // Этот экзамен уже завершён локально — не открываем его повторно.
        console.log('[API] игнорируем устаревший lastMode завершённого экзамена',
                    apiLm.startedAt);
        Store.data.lastMode = null;
      } else {
        const apiTs = apiLm.ts || 0;
        const locTs = locLm?.ts || 0;
        if (apiTs >= locTs) Store.data.lastMode = apiLm;
      }
      _saveLocal();
      console.log('[API] синхронизировано:',
                  'marathon=' + Object.keys(Store.data.answers).length,
                  'section='  + Object.keys(Store.data.sectionAnswers).length,
                  'exam_used=' + Store.data.examUsed.length,
                  'exam_mistakes=' + Store.data.examMistakes.length,
                  'lastMode='  + (Store.data.lastMode?.type || 'null'));
    }
  } catch(e) {
    console.warn('[API] loadFromCloud ошибка:', e);
  }
  cb();  // всегда вызываем cb() даже при ошибке
};

// Сброс прогресса — чистим и API тоже
Store.resetWithApi = function() {
  Store.data = {
    answers: {}, sectionAnswers: {}, examUsed: [], examMistakes: [],
    examCorrect: [], marathonOrder: null, statsStatus: {},
    lastMode: null, overrides: Store.data.overrides || {},
  };
  _saveLocal();
  localStorage.removeItem('gosexam_last_save_ts');
  const auth = _apiAuth();
  if (!auth) return;
  _apiFetch(`/progress/${auth.userId}`, { method: 'DELETE' });
  console.log('[API] прогресс сброшен (оба пула + examUsed + examMistakes)');
};

// Проверка: завершался ли уже экзамен с таким started_at локально.
// Используется как страховка, чтобы устаревший lastMode из облака
// (если по какой-то причине пришёл) не открыл уже завершённый экзамен заново.
function isFinalizedExam(startedAt) {
  if (!startedAt) return false;
  try {
    const raw = localStorage.getItem('gosexam_finalized_exams_v1') || '[]';
    const list = JSON.parse(raw);
    return Array.isArray(list) && list.includes(startedAt);
  } catch (e) { return false; }
}

/* Старт */
async function fetchMaintenance() {
  const user     = tg?.initDataUnsafe?.user;
  const initData = tg?.initData || '';
  if (!user?.id || !initData) return { status: 'off', is_admin: false, message: '' };
  if (!API_URL || API_URL.includes('ВАШ_ДОМЕН') || !API_URL.startsWith('https')) {
    return { status: 'off', is_admin: false, message: '' };
  }
  try {
    const r = await fetch(`${API_URL}/maintenance`, {
      headers: { 'Authorization': 'TgInitData ' + initData },
      cache: 'no-store',
    });
    if (!r.ok) return { status: 'off', is_admin: false, message: '' };
    return await r.json();
  } catch(e) {
    return { status: 'off', is_admin: false, message: '' };
  }
}

function renderMaintBanner(state) {
  const el = document.getElementById('maint-banner');
  if (!el) return;
  const s = state?.status || 'off';
  const msg = state?.message || '';
  if (s === 'banner') {
    el.className = 'show banner';
    el.textContent = msg || '⚠️ Идут технические работы.';
  } else if (s === 'block' && state?.is_admin) {
    el.className = 'show block-admin';
    el.textContent = '🛑 Тех.работы активны. Обычные пользователи заблокированы. ' + msg;
  } else {
    el.className = '';
    el.textContent = '';
  }
}

function showMaintBlock(loader, ltext, message) {
  loader.style.background = 'var(--bg, #1a1a2e)';
  loader.style.opacity    = '1';
  loader.style.display    = 'flex';
  const safeMsg = (message || 'Идут технические работы. Зайдите чуть позже.')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  ltext.innerHTML =
    '<div style="text-align:center;padding:32px 24px;">' +
    '<div style="font-size:48px;margin-bottom:16px;">🛠️</div>' +
    '<div style="font-size:18px;font-weight:700;margin-bottom:10px;">Тех. работы</div>' +
    '<div style="font-size:14px;color:#888;line-height:1.5;">' + safeMsg + '</div>' +
    '<div style="margin-top:24px;">' +
    '<button onclick="location.reload()" style="padding:10px 20px;border-radius:8px;background:#6ba4ff;color:#fff;border:none;font-size:14px;cursor:pointer;">🔄 Обновить</button>' +
    '</div></div>';
}

// Периодический опрос состояния: каждые 60 сек.
// Если режим сменился на block (и юзер не админ) — перезагружаем страницу,
// чтобы показать заглушку. Иначе просто обновляем баннер.
let _maintLastStatus = 'off';
function startMaintPolling() {
  setInterval(async () => {
    const st = await fetchMaintenance();
    const s  = st.status || 'off';
    if (s === 'block' && !st.is_admin) {
      // обычный юзер во время работы → разлогиниваем UI через перезагрузку
      location.reload();
      return;
    }
    if (s !== _maintLastStatus) {
      _maintLastStatus = s;
    }
    renderMaintBanner(st);
  }, 60000);
}

async function checkAccess() {
  const user     = tg?.initDataUnsafe?.user;
  const initData = tg?.initData || '';
  // Если открыт вне Telegram или API не настроен — пропускаем проверку
  if (!user?.id || !initData) return true;
  if (!API_URL || API_URL.includes('ВАШ_ДОМЕН') || !API_URL.startsWith('https')) return true;
  try {
    const r = await fetch(`${API_URL}/access/${user.id}`, {
      headers: { 'Authorization': 'TgInitData ' + initData },
    });
    if (!r.ok) return true; // ошибка сети/сервера — не блокируем
    const data = await r.json();
    return data.allowed !== false; // блокируем только при явном false
  } catch(e) {
    return true; // нет связи с API — не блокируем
  }
}

function showNoAccess(loader, ltext) {
  loader.style.background = 'var(--bg, #1a1a2e)';
  loader.style.opacity    = '1';
  loader.style.display    = 'flex';
  ltext.innerHTML =
    '<div style="text-align:center;padding:32px 24px;">' +
    '<div style="font-size:48px;margin-bottom:16px;">🔒</div>' +
    '<div style="font-size:18px;font-weight:700;margin-bottom:10px;">Доступ закрыт</div>' +
    '<div style="font-size:14px;color:#888;line-height:1.5;">Для использования тренажёра<br>необходимо оплатить доступ.<br><br>' +
    'Обратись к администратору бота.</div>' +
    '</div>';
}

async function boot() {
  const loader = document.getElementById('tg-loader');
  const ltext  = document.getElementById('tg-loader-text');
  const header = document.getElementById('main-header');
  const appEl  = document.getElementById('app');
  try {
    ltext.textContent = 'Проверяем доступ…';
    const allowed = await checkAccess();
    if (!allowed) {
      showNoAccess(loader, ltext);
      return;
    }
    // Проверка режима тех.работ. Если block и юзер не админ — заглушка.
    const maint = await fetchMaintenance();
    _maintLastStatus = maint.status || 'off';
    if (maint.status === 'block' && !maint.is_admin) {
      showMaintBlock(loader, ltext, maint.message);
      return;
    }
    ltext.textContent = 'Загружаем вопросы…';
    await loadQuestions();
    ltext.textContent = 'Синхронизируем прогресс…';
    Store.load();
    await new Promise(r => Store.loadFromCloud(r));
    // Подтягиваем историю экзаменов (необязательная операция — не блокирует UI)
    loadExamHistoryFromCloud().catch(e => console.warn('history load:', e));
    loader.style.opacity = '0';
    setTimeout(() => {
      loader.style.display = 'none';
      header.style.visibility = '';
      appEl.style.visibility = '';
      // Баннер (banner или block-для-админа) — рисуем после показа UI
      renderMaintBanner(maint);
      startMaintPolling();
      App.renderHome();
    }, 350);
  } catch(e) {
    if (e.message === 'ACCESS_DENIED') {
      showNoAccess(loader, ltext);
    } else {
      ltext.innerHTML = '⚠️ Ошибка загрузки<br><small style="color:#888">' + e.message + '</small><br><br>'
        + '<button onclick="boot()" style="padding:10px 20px;border-radius:8px;background:#6ba4ff;color:#fff;border:none;font-size:14px;cursor:pointer;">Повторить</button>';
    }
  }
}
boot();
