<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Тренажёр госэкзамена</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>

  /* ====== Базовые стили ====== */
  :root {
    --bg: #0f1419;
    --bg-elevated: #1a1f29;
    --bg-card: #232a37;
    --border: #2f3744;
    --border-strong: #3f4a5c;
    --text: #e6eaf2;
    --text-dim: #8b95a8;
    --text-muted: #5f6776;
    --accent: #6ba4ff;
    --accent-hover: #8bb8ff;
    --correct: #2ecc71;
    --correct-bg: rgba(46, 204, 113, 0.12);
    --wrong: #e74c3c;
    --wrong-bg: rgba(231, 76, 60, 0.12);
    --warn: #f1c40f;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }

  /* ====== Шапка ====== */
  header.top {
    border-bottom: 1px solid var(--border);
    background: var(--bg-elevated);
    position: sticky;
    top: 0;
    z-index: 50;
    backdrop-filter: blur(10px);
  }
  .top-inner {
    max-width: 900px;
    margin: 0 auto;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    justify-content: space-between;
  }
  .top-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin: 0;
    cursor: pointer;
    user-select: none;
  }
  .top-title:hover { color: var(--accent); }
  .top-meta {
    font-size: 13px;
    color: var(--text-dim);
  }

  /* ====== Кнопки ====== */
  button, .btn {
    font-family: inherit;
    font-size: 14px;
    border: 1px solid var(--border-strong);
    background: var(--bg-card);
    color: var(--text);
    padding: 10px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s ease;
    font-weight: 500;
  }
  button:hover, .btn:hover {
    background: var(--bg-elevated);
    border-color: var(--accent);
  }
  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #0f1419;
    font-weight: 600;
  }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .btn-ghost {
    background: transparent;
    border-color: transparent;
    color: var(--text-dim);
  }
  .btn-ghost:hover { background: var(--bg-card); color: var(--text); border-color: var(--border); }
  .btn-danger {
    border-color: var(--wrong);
    color: var(--wrong);
  }
  .btn-danger:hover { background: var(--wrong-bg); }

  /* ====== Главное меню ====== */
  .mode-grid {
    display: grid;
    gap: 14px;
    grid-template-columns: 1fr;
    margin-top: 24px;
  }
  @media (min-width: 640px) { .mode-grid { grid-template-columns: 1fr 1fr; } }

  .mode-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: left;
    width: 100%;
    color: var(--text);
  }
  .mode-card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: var(--shadow);
  }
  .mode-card-icon {
    font-size: 24px;
    margin-bottom: 8px;
  }
  .mode-card-title {
    font-weight: 600;
    font-size: 16px;
    margin-bottom: 6px;
  }
  .mode-card-desc {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.45;
  }

  /* ====== Общая статистика ====== */
  .stats-bar {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin: 20px 0;
    padding: 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .stat-item {
    flex: 1;
    min-width: 100px;
  }
  .stat-value {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
  }
  .stat-value.correct { color: var(--correct); }
  .stat-value.wrong { color: var(--wrong); }
  .stat-label {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  h2 {
    font-size: 18px;
    font-weight: 600;
    margin: 28px 0 12px;
    color: var(--text);
  }

  /* ====== Список разделов/тем ====== */
  .topic-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .section-block {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .section-header {
    padding: 14px 18px;
    font-weight: 600;
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border);
    font-size: 15px;
  }
  .topic-row {
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    gap: 12px;
    transition: background 0.12s;
  }
  .topic-row:last-child { border-bottom: none; }
  .topic-row:hover { background: var(--bg-elevated); }
  .topic-title {
    flex: 1;
    min-width: 0;
  }
  .topic-name {
    font-size: 14px;
    color: var(--text);
  }
  .topic-meta {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .topic-progress {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .topic-progress .pct {
    font-weight: 600;
    color: var(--text);
  }

  /* ====== Прогресс-бар ====== */
  .progress {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 8px;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s ease;
  }
  .progress-fill.correct { background: var(--correct); }

  /* ====== Карточка вопроса ====== */
  .question-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--text-dim);
    flex-wrap: wrap;
    gap: 8px;
  }
  .question-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
  }
  .question-tag {
    display: inline-block;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--border);
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-right: 6px;
    font-weight: 500;
  }
  .question-tag.calc { background: rgba(241, 196, 15, 0.2); color: var(--warn); }
  .question-tag.multi { background: rgba(107, 164, 255, 0.2); color: var(--accent); }
  .question-tag.seq { background: rgba(155, 89, 182, 0.2); color: #b67ed3; }
  .question-text {
    font-size: 16px;
    line-height: 1.55;
    margin-bottom: 18px;
    color: var(--text);
    white-space: pre-wrap;
  }
  .question-image {
    max-width: 100%;
    border-radius: 8px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    background: #fff;
    padding: 6px;
    display: block;
  }

  /* ====== Варианты ответов ====== */
  .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 14px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.12s;
    background: var(--bg-elevated);
    user-select: none;
  }
  .option:hover { border-color: var(--accent); }
  .option.selected { border-color: var(--accent); background: rgba(107, 164, 255, 0.08); }
  .option.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
  }
  .option.wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
  }
  .option.reveal-correct {
    border-color: var(--correct);
    background: var(--correct-bg);
  }
  .option-marker {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border-strong);
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .option-marker.square { border-radius: 4px; }
  .option.selected .option-marker { border-color: var(--accent); }
  .option.selected .option-marker::after {
    content: '';
    width: 10px;
    height: 10px;
    background: var(--accent);
    border-radius: 50%;
  }
  .option.selected .option-marker.square::after { border-radius: 2px; }
  .option.correct .option-marker, .option.reveal-correct .option-marker { border-color: var(--correct); }
  .option.correct .option-marker::after, .option.reveal-correct .option-marker::after {
    content: '✓';
    color: var(--correct);
    font-weight: 700;
    background: none;
    width: auto;
    height: auto;
    font-size: 14px;
    line-height: 1;
  }
  .option.wrong .option-marker { border-color: var(--wrong); }
  .option.wrong .option-marker::after {
    content: '✗';
    color: var(--wrong);
    font-weight: 700;
    background: none;
    width: auto;
    height: auto;
    font-size: 14px;
    line-height: 1;
  }
  .option-text { flex: 1; font-size: 14px; line-height: 1.5; }

  /* ====== Drag-and-drop для последовательностей ====== */
  .sequence-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .seq-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--bg-elevated);
    cursor: grab;
    transition: all 0.12s;
  }
  .seq-item:active { cursor: grabbing; }
  .seq-item.dragging { opacity: 0.5; }
  .seq-item.drag-over { border-color: var(--accent); }
  .seq-item.correct { border-color: var(--correct); background: var(--correct-bg); }
  .seq-item.wrong { border-color: var(--wrong); background: var(--wrong-bg); }
  .seq-handle { color: var(--text-muted); cursor: grab; font-size: 16px; }
  .seq-num {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .seq-text { flex: 1; font-size: 14px; }
  .seq-btn {
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    color: var(--text);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }
  .seq-btn:hover:not(:disabled) { background: var(--bg); border-color: var(--accent); }
  .seq-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ====== Feedback ====== */
  .feedback {
    margin-top: 16px;
    padding: 14px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    border: 1px solid;
  }
  .feedback.correct { background: var(--correct-bg); border-color: var(--correct); color: var(--correct); }
  .feedback.wrong { background: var(--wrong-bg); border-color: var(--wrong); color: var(--wrong); }
  .feedback strong { font-weight: 600; }
  .solution-block {
    margin-top: 12px;
    padding: 12px 14px;
    border-left: 3px solid var(--warn);
    background: rgba(241, 196, 15, 0.06);
    color: var(--text);
    font-size: 13px;
    line-height: 1.6;
    border-radius: 0 4px 4px 0;
    white-space: pre-wrap;     /* сохраняем переносы строк из solution */
    word-wrap: break-word;
  }
  .solution-block strong { color: var(--warn); }

  /* ====== Footer карточки (репорт + бейдж) ====== */
  .card-footer {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px dashed var(--border);
    flex-wrap: wrap;
  }
  .card-footer-spacer { flex: 1; }
  .btn-report {
    font-size: 12px;
    padding: 6px 12px;
    color: var(--text-dim);
  }
  .btn-report:hover { color: var(--warn); border-color: var(--warn); background: rgba(241, 196, 15, 0.06); }
  .edited-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(107, 164, 255, 0.12);
    color: var(--accent);
    font-weight: 500;
  }

  /* ====== Модальное окно редактора ====== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
    overflow-y: auto;
  }
  .modal {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 100%;
    max-width: 700px;
    padding: 24px;
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    gap: 12px;
  }
  .modal-title { font-size: 17px; font-weight: 600; margin: 0; }
  .modal-close {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 24px;
    line-height: 1;
    cursor: pointer;
    padding: 4px 8px;
  }
  .modal-close:hover { color: var(--text); background: var(--bg-card); border-color: transparent; }
  .modal-section {
    margin-bottom: 16px;
  }
  .modal-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .modal textarea, .modal input[type="text"] {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.5;
    resize: vertical;
  }
  .modal textarea { min-height: 70px; }
  .modal textarea:focus, .modal input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .editor-option {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    margin-bottom: 8px;
    padding: 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .editor-option.is-correct { border-color: var(--correct); background: var(--correct-bg); }
  .editor-option-toggle {
    background: transparent;
    border: 2px solid var(--border-strong);
    color: var(--text-dim);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    font-weight: 700;
    flex-shrink: 0;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .editor-option-toggle:hover { border-color: var(--correct); color: var(--correct); }
  .editor-option.is-correct .editor-option-toggle {
    border-color: var(--correct);
    color: var(--correct);
    background: rgba(46, 204, 113, 0.15);
  }
  .editor-option textarea { flex: 1; min-height: 50px; }
  .editor-option-remove {
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--text-dim);
    width: 32px;
    height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    flex-shrink: 0;
    padding: 0;
  }
  .editor-option-remove:hover { color: var(--wrong); border-color: var(--wrong); }
  .editor-add-opt {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--border-strong);
    color: var(--text-dim);
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .editor-add-opt:hover { border-color: var(--accent); color: var(--accent); }
  .editor-seq-item {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 6px;
    padding: 8px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .editor-seq-num {
    width: 28px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    flex-shrink: 0;
  }
  .editor-seq-item input { flex: 1; }
  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .modal-actions .spacer { flex: 1; }
  .modal-hint {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
    line-height: 1.5;
  }

  /* ====== Блок «Мои правки» на главной ====== */
  .patches-block {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-top: 12px;
  }
  .patches-info { margin-bottom: 12px; }
  .patches-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .patches-actions button { font-size: 13px; padding: 8px 12px; }

  /* ====== Навигация по тесту ====== */
  .nav-bar {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 16px;
  }
  .nav-bar .spacer { flex: 1; }
  .nav-counter {
    font-size: 13px;
    color: var(--text-dim);
    text-align: center;
  }

  /* ====== Результаты экзамена ====== */
  .result-banner {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    text-align: center;
    margin-bottom: 20px;
  }
  .result-score {
    font-size: 48px;
    font-weight: 700;
    margin: 8px 0;
  }
  .result-grade {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .grade-otl { color: var(--correct); }
  .grade-hor { color: #1abc9c; }
  .grade-udov { color: var(--warn); }
  .grade-neud { color: var(--wrong); }
  .result-detail {
    color: var(--text-dim);
    font-size: 14px;
  }

  /* ====== Палитра кнопок-вопросов в общем режиме ====== */
  .question-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(36px, 1fr));
    gap: 4px;
    margin: 16px 0;
    max-height: 200px;
    overflow-y: auto;
    padding: 4px;
    background: var(--bg-elevated);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    position: relative;   /* чтобы offsetTop чипов считался относительно сетки */
  }
  .q-chip {
    aspect-ratio: 1;
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    background: var(--bg-card);
    color: var(--text-dim);
    cursor: pointer;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s;
  }
  .q-chip:hover { transform: scale(1.1); border-color: var(--accent); }
  .q-chip.current { border-color: var(--accent); color: var(--accent); font-weight: 700; }
  .q-chip.correct { background: var(--correct-bg); border-color: var(--correct); color: var(--correct); }
  .q-chip.wrong { background: var(--wrong-bg); border-color: var(--wrong); color: var(--wrong); }

  /* ====== Утилитарные классы ====== */
  .hidden { display: none !important; }
  .row { display: flex; align-items: center; gap: 12px; }
  .row.between { justify-content: space-between; }
  .muted { color: var(--text-dim); }
  .small { font-size: 12px; }

  /* Скроллбар */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

html, body { margin: 0; overscroll-behavior-y: none; }
::-webkit-scrollbar { width: 0; }
#tg-loader {
  position: fixed; inset: 0; z-index: 9999;
  background: #0f1419;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; color: #8b95a8; font-size: 14px;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  transition: opacity 0.4s;

</style>
</head>
<body>

<div id="tg-loader">
  <div class="tg-spinner"></div>
  <div id="tg-loader-text">Загружаем вопросы…</div>
</div>

<div id="maint-banner"></div>

<header class="top" id="main-header" style="visibility:hidden;">
  <div class="top-inner">
    <h1 class="top-title" onclick="App.exitToHome()">📚 Тренажёр ГОС</h1>
    <div class="top-meta" id="topMeta"></div>
  </div>
</header>

<main class="container" id="app" style="visibility:hidden;"></main>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const haptic = {
  light:   () => tg?.HapticFeedback?.impactOccurred('light'),
  success: () => tg?.HapticFeedback?.notificationOccurred('success'),
  error:   () => tg?.HapticFeedback?.notificationOccurred('error'),
};

function setBackBtn(show) {
  if (!tg?.BackButton) return;
  show ? tg.BackButton.show() : tg.BackButton.hide();
}

let QUESTIONS = [];      // ТОЛЬКО для тренажёра (марафон, экзамен, разделы, ошибки)
let QUESTIONS_ALL = [];  // Полный набор (включая search_only — для поиска)

// Версия сборки — видно в консоли при запуске, чтобы понять, какая версия
// страницы реально загрузилась (а не из кэша Telegram WebView).
const BUILD_VERSION = 'network-first-questions-6 (2026-06)';
console.log('[gosexam] BUILD_VERSION =', BUILD_VERSION);

const QUESTIONS_URL = 'https://raw.githubusercontent.com/VladislavNoname/gosbot-/main/questions_miniapp.json';
const Q_CACHE_KEY = 'gosexam_q_cache_v3';
const Q_CACHE_TS  = 'gosexam_q_cache_ts_v3';
const Q_CACHE_TTL = 30 * 60 * 1000;  // 30 мин кэш

// Базовый URL папки с картинками вопросов.
// Картинки лежат рядом с miniapp_standalone.html в подпапке images/.
// Используем относительный путь — он сработает и на GitHub Pages, и при локальном
// хостинге, и в Telegram WebView.
const IMAGES_BASE_URL = 'images/';
function imageUrl(name) {
  if (!name) return '';
  // Если уже абсолютный URL — возвращаем как есть
  if (/^https?:/.test(name)) return name;
  return IMAGES_BASE_URL + name;
}

function _rebuildIndex() {
  // QUESTIONS_ALL — что пришло (включая search_only и формулы)
  // QUESTIONS — фильтрованное для тренажёра: без search_only, без формул
  QUESTIONS = QUESTIONS_ALL.filter(q => !q.search_only && q.type !== 'formula');
  // Индекс по id строим по ПОЛНОМУ набору — чтобы поиск находил формулы и т.п.
  QUESTIONS_BY_ID = new Map(QUESTIONS_ALL.map(q => [q.id, q]));
}

// ── Расшифровка вопросов (AES-256-GCM, Web Crypto API) ──────
async function loadQuestions() {
  // Стратегия: СНАЧАЛА СЕТЬ (всегда свежие вопросы), кэш — только как
  // запасной вариант при отсутствии связи. Так правки на сервере видны сразу,
  // без 30-минутной задержки и без залипания в HTTP-кэше WebView.
  const user     = tg?.initDataUnsafe?.user;
  const initData = tg?.initData || '';
  const useApi   = user?.id && initData && API_URL && !API_URL.includes('ВАШ_ДОМЕН') && API_URL.startsWith('https');

  try {
    let data;
    if (useApi) {
      // ?t= + cache:'no-store' — чтобы Telegram WebView не отдавал старый ответ из HTTP-кэша
      const r = await fetch(`${API_URL}/questions?t=${Date.now()}`, {
        cache: 'no-store',
        headers: { 'Authorization': 'TgInitData ' + initData },
      });
      if (r.status === 403) throw new Error('ACCESS_DENIED');
      if (!r.ok) throw new Error('HTTP ' + r.status);
      data = await r.json();
    } else {
      const r = await fetch(QUESTIONS_URL + '?t=' + Date.now(), { cache: 'no-store' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      data = await r.json();
    }

    QUESTIONS_ALL = data;
    _rebuildIndex();
    // Обновляем кэш (он теперь нужен только для офлайна)
    try {
      localStorage.setItem(Q_CACHE_KEY, JSON.stringify(QUESTIONS_ALL));
      localStorage.setItem(Q_CACHE_TS, String(Date.now()));
    } catch(e) {}
    return;
  } catch (netErr) {
    // Отказ в доступе — это не проблема сети, ведём себя как раньше.
    if (netErr && netErr.message === 'ACCESS_DENIED') throw netErr;
    // Сеть недоступна → пробуем последний сохранённый кэш (офлайн-режим).
    try {
      const cached = localStorage.getItem(Q_CACHE_KEY);
      if (cached) {
        QUESTIONS_ALL = JSON.parse(cached);
        _rebuildIndex();
        return;
      }
    } catch(e) {}
    // Ни сети, ни кэша — пробрасываем исходную ошибку.
    throw netErr;
  }
}

const STORAGE_KEY = 'gosexam_progress_v1';

/* ---------- Загрузка вопросов ---------- */
// QUESTIONS loaded via fetch (see boot)

/* ---------- Хранение прогресса и правок ----------
   Структура:
   {
     answers: { [questionId]: { status, given, ts } },
     lastMode: { type, currentIndex, order: [ids] },
     overrides: { [questionId]: { text?, options?, sequence?, solution?, ts } }
   }
   overrides — пользовательские правки вопросов поверх исходного JSON.
*/
const Store = {
  // data:
  //   answers          — пул марафона
  //   sectionAnswers   — пул разделов/тем
  //   examUsed         — массив qid, использованных в экзаменах (для уникальности)
  //   examMistakes     — массив qid, в которых юзер ошибся (или не ответил) в экзаменах.
  //                       Источник для "Работы над ошибками" дополнительно к marathon/section wrong.
  //                       При правильном повторе qid удаляется отсюда.
  //   examCorrect      — массив qid, отвеченных ПРАВИЛЬНО в экзаменах. Влияет на
  //                       «Изучено %» (общий пул), но НЕ помечает вопросы как решённые
  //                       в марафоне/разделах (там свои пулы). Чистится только полным сбросом.
  //   marathonOrder    — стабильный порядок вопросов марафона. Генерируется один раз
  //                       и НЕ перемешивается при каждом входе. Пересоздаётся только
  //                       при изменении набора вопросов или явной очистке марафона.
  //   lastMode         — текущий режим (марафон/экзамен)
  //   overrides        — пользовательские правки вопросов
  //   statsStatus      — НЕЗАВИСИМАЯ общая статистика: { qid: {status,given,ts} }.
  //                       Обновляется ЛЮБЫМ ответом (марафон/раздел/экзамен/работа над
  //                       ошибками) по принципу «последний ответ побеждает». НЕ зависит
  //                       от сбросов марафона/разделов/работы над ошибками. Чистится
  //                       только из экрана статистики (или полным сбросом прогресса).
  data: { answers: {}, sectionAnswers: {}, examUsed: [], examMistakes: [],
          examCorrect: [], marathonOrder: null, statsStatus: {},
          lastMode: null, overrides: {} },
  load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) this.data = JSON.parse(raw);
    } catch (e) { console.warn('Не удалось загрузить прогресс:', e); }
    if (!this.data.answers)        this.data.answers = {};
    if (!this.data.sectionAnswers) this.data.sectionAnswers = {};
    if (!this.data.examUsed)       this.data.examUsed = [];
    if (!this.data.examMistakes)   this.data.examMistakes = [];
    if (!this.data.examCorrect)    this.data.examCorrect = [];
    if (this.data.marathonOrder === undefined) this.data.marathonOrder = null;
    if (!this.data.overrides)      this.data.overrides = {};
    // Миграция общей статистики: если её ещё нет — строим из имеющихся пулов один раз,
    // чтобы у существующих пользователей сохранились прежние цифры на главной.
    if (this.data.statsStatus === undefined || this.data.statsStatus === null) {
      this.data.statsStatus = this._buildStatsFromPools();
    }
  },
  /** Разово собирает statsStatus из старых пулов (для миграции). Логика повторяет
   *  прежний подсчёт главной: ошибки приоритетны, иначе верно из марафона/разделов/экзамена. */
  _buildStatsFromPools() {
    const stats = {};
    const wrong = new Set((this.data.examMistakes || []).map(Number));
    const ec    = new Set((this.data.examCorrect  || []).map(Number));
    const ids   = new Set();
    Object.keys(this.data.answers || {}).forEach(id => ids.add(Number(id)));
    Object.keys(this.data.sectionAnswers || {}).forEach(id => ids.add(Number(id)));
    wrong.forEach(id => ids.add(id));
    ec.forEach(id => ids.add(id));
    for (const id of ids) {
      const a = this.data.answers[id] || this.data.answers[String(id)];
      const b = this.data.sectionAnswers[id] || this.data.sectionAnswers[String(id)];
      const combined = (a && b) ? ((a.ts || 0) >= (b.ts || 0) ? a : b) : (a || b);
      let status, given;
      if (wrong.has(id))                            { status = 'wrong';   given = combined ? combined.given : undefined; }
      else if (combined && combined.status === 'correct') { status = 'correct'; given = combined.given; }
      else if (ec.has(id))                          { status = 'correct'; given = undefined; }
      else if (combined && combined.status === 'wrong')   { status = 'wrong';   given = combined.given; }
      if (status) stats[id] = { status, given, ts: (combined && combined.ts) || 1 };
    }
    return stats;
  },
  save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(this.data)); }
    catch (e) { console.warn('Не удалось сохранить прогресс:', e); }
  },
  /** Получить ответ для qid в указанном scope. По умолчанию marathon (для обратной
   * совместимости с многочисленными местами, где scope не указан явно).
   * Для scope='exam_mistakes' возвращаем null — там хранятся только qid, без given;
   * UI просто покажет вопрос без подсветки прошлого ответа. */
  getAnswer(qid, scope = 'marathon') {
    if (scope === 'exam_mistakes') return null;
    const pool = scope === 'section' ? this.data.sectionAnswers : this.data.answers;
    return pool[qid];
  },
  /** Записать ответ в указанный scope. Дополнительно, если ответ wrong — qid
   *  ДОБАВЛЯЕТСЯ в examMistakes (Set без дублей). Correct examMistakes НЕ трогает:
   *  пул ошибок — это архив всех неправильных ответов для отработки, его чистит
   *  только пользователь вручную через кнопку «Очистить» или полным сбросом. */
  recordAnswer(qid, status, given, scope = 'marathon') {
    const pool = scope === 'section' ? this.data.sectionAnswers : this.data.answers;
    pool[qid] = { status, given, ts: Date.now() };

    if (status === 'wrong') {
      const qidNum = Number(qid);
      const setM = new Set((this.data.examMistakes || []).map(Number));
      setM.add(qidNum);
      this.data.examMistakes = Array.from(setM);
    }

    this.recordStat(qid, status, given);   // обновляем общую статистику (последний ответ)
    this.save();
  },
  /** Обновить общую статистику по вопросу (последний ответ побеждает).
   *  Вызывается из ВСЕХ режимов: марафон, разделы, экзамен, работа над ошибками.
   *  Не сохраняет сам — вызывающий вызывает Store.save(). */
  recordStat(qid, status, given) {
    if (!this.data.statsStatus) this.data.statsStatus = {};
    this.data.statsStatus[Number(qid)] = { status, given, ts: Date.now() };
  },
  /** Статус вопроса в общей статистике: 'correct' | 'wrong' | 'none'. */
  statStatusOf(qid) {
    const s = this.data.statsStatus && this.data.statsStatus[Number(qid)];
    return s ? s.status : 'none';
  },
  /** Получить общую статистику по обоим пулам объединённо (нужно для главного экрана:
   * "сколько всего отвечено"). Уникализация по qid: если вопрос отвечен в обоих,
   * считаем один раз — по более свежей записи. */
  getCombinedAnswer(qid) {
    const a = this.data.answers[qid];
    const b = this.data.sectionAnswers[qid];
    if (a && b) return (a.ts || 0) >= (b.ts || 0) ? a : b;
    return a || b;
  },
  resetAll() {
    this.data = {
      answers: {}, sectionAnswers: {}, examUsed: [], examMistakes: [],
      examCorrect: [], marathonOrder: null, statsStatus: {},
      lastMode: null, overrides: this.data.overrides || {},
    };
    this.save();
  },
  /** Локальный сброс подмножества (БЕЗ серверной синхронизации). По умолчанию чистит ОБА пула. */
  resetSubset(ids, scope = 'all') {
    if (scope === 'marathon' || scope === 'all') {
      for (const id of ids) delete this.data.answers[id];
    }
    if (scope === 'section' || scope === 'all') {
      for (const id of ids) delete this.data.sectionAnswers[id];
    }
    this.save();
  },
  /**
   * Сброс ответов по подмножеству id С СИНХРОНИЗАЦИЕЙ С СЕРВЕРОМ.
   * scope: 'marathon' | 'section' | 'all' — какой пул чистить.
   * Обычный resetSubset() локально удалит, но POST /progress мерджит — удалённые
   * ответы вернутся с сервера. Поэтому здесь явный POST /progress/{uid}/delete-answers.
   */
  async resetSubsetWithCloud(ids, scope = 'all') {
    if (!ids || ids.length === 0) return 0;
    // 1) Локально удаляем сразу
    if (scope === 'marathon' || scope === 'all') {
      for (const id of ids) delete this.data.answers[id];
    }
    if (scope === 'section' || scope === 'all') {
      for (const id of ids) delete this.data.sectionAnswers[id];
    }
    if (scope === 'exam_mistakes') {
      const rm = new Set(ids.map(Number));
      this.data.examMistakes = (this.data.examMistakes || []).filter(x => !rm.has(Number(x)));
    }
    if (scope === 'stats') {
      // Чистим ТОЛЬКО общую статистику. Марафон/разделы/ошибки не трогаем.
      if (this.data.statsStatus) for (const id of ids) delete this.data.statsStatus[Number(id)];
    }
    // НЕ зовём this.save() (он сделал бы POST /progress который мерджит) —
    // вместо этого зовём localStorage напрямую + явный delete-answers на сервер.
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(this.data)); }
    catch (e) { console.warn('Не удалось сохранить прогресс:', e); }
    const auth = _apiAuth();
    if (!auth) return ids.length;
    try {
      const r = await _apiFetch(`/progress/${auth.userId}/delete-answers`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ids: ids.map(x => Number(x)), scope }),
      });
      if (r) {
        const d = await r.json();
        return d.removed || 0;
      }
    } catch(e) {
      console.warn('resetSubsetWithCloud:', e);
    }
    return ids.length;
  },
  setLastMode(mode) { this.data.lastMode = mode; this.save(); },
  clearLastMode() { this.data.lastMode = null; this.save(); },

  /* ---- Правки вопросов ---- */
  getOverride(qid) { return this.data.overrides[qid]; },
  setOverride(qid, patch) {
    this.data.overrides[qid] = Object.assign({}, patch, { ts: Date.now() });
    this.save();
  },
  removeOverride(qid) {
    delete this.data.overrides[qid];
    // Также сбросим сохранённый ответ — он мог стать невалидным после изменения правильного варианта
    delete this.data.answers[qid];
    this.save();
  },
  getAllOverrides() { return this.data.overrides; },
  countOverrides() { return Object.keys(this.data.overrides).length; },
  importOverrides(obj, mode = 'merge') {
    // mode: 'merge' — добавить к существующим, 'replace' — заменить все
    if (mode === 'replace') this.data.overrides = {};
    let added = 0;
    for (const [qid, patch] of Object.entries(obj || {})) {
      // Проверим, что вопрос существует
      if (QUESTIONS.find(q => String(q.id) === String(qid))) {
        this.data.overrides[qid] = Object.assign({}, patch, { ts: patch.ts || Date.now() });
        // Сбросим ответ при изменении вопроса
        delete this.data.answers[qid];
        added++;
      }
    }
    this.save();
    return added;
  },
};
Store.load();

/* ---------- История экзаменов ----------
   Локальный кэш в localStorage + синхронизация с /exam-history/{userId}.
   Каждая запись: { started_at, finished_at, total, correct, duration_ms, details: { sections: [...] } }
   Идентификатор записи — started_at (он же UNIQUE на сервере).
*/
const EXAM_HISTORY_KEY = 'gosexam_history_v1';
const ExamHistory = {
  _items: [],
  load() {
    try {
      const raw = localStorage.getItem(EXAM_HISTORY_KEY);
      this._items = raw ? JSON.parse(raw) : [];
      if (!Array.isArray(this._items)) this._items = [];
    } catch (e) { this._items = []; }
  },
  _save() {
    try { localStorage.setItem(EXAM_HISTORY_KEY, JSON.stringify(this._items)); }
    catch (e) { console.warn('Не удалось сохранить историю экзаменов:', e); }
  },
  all() { return this._items.slice().sort((a, b) => b.finished_at - a.finished_at); },
  add(attempt) {
    // Дедуп по started_at — та же логика, что и в API
    const existing = this._items.find(x => x.started_at === attempt.started_at);
    if (existing) return false;
    this._items.push(attempt);
    this._save();
    return true;
  },
  replaceAll(items) {
    this._items = Array.isArray(items) ? items.slice() : [];
    this._save();
  },
  clear() {
    this._items = [];
    this._save();
  },
  count() { return this._items.length; },
};
ExamHistory.load();

/* ---------- Доступ к вопросам с учётом пользовательских правок ---------- */
let QUESTIONS_BY_ID = new Map(); // заполняется после loadQuestions()
// Возвращает «эффективную» версию вопроса: оригинал + применённый override
function getQuestion(id) {
  const base = QUESTIONS_BY_ID.get(id);
  if (!base) return null;
  const ov = Store.getOverride(id);
  if (!ov) return base;
  // Поверхностный клон + применение полей
  const merged = Object.assign({}, base);
  if (ov.text !== undefined) merged.text = ov.text;
  if (ov.options !== undefined) merged.options = ov.options;
  if (ov.sequence !== undefined) merged.sequence = ov.sequence;
  if (ov.solution !== undefined) merged.solution = ov.solution;
  merged._edited = true; // флаг для UI
  return merged;
}
function isEdited(id) { return !!Store.getOverride(id); }

/* ---------- Утилиты ---------- */
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function arraysEqual(a, b) {
  if (a.length !== b.length) return false;
  for (let i = 0; i < a.length; i++) if (a[i] !== b[i]) return false;
  return true;
}
function setsEqual(a, b) {
  if (a.size !== b.size) return false;
  for (const x of a) if (!b.has(x)) return false;
  return true;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'
  }[c]));
}
function pluralRu(n, one, few, many) {
  const m10 = Math.abs(n) % 10;
  const m100 = Math.abs(n) % 100;
  if (m10 === 1 && m100 !== 11) return one;
  if (m10 >= 2 && m10 <= 4 && (m100 < 12 || m100 > 14)) return few;
  return many;
}
function el(tag, props = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (v === null || v === undefined || v === false) continue; // не ставим атрибут вовсе
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'dataset') Object.assign(e.dataset, v);
    else if (k === 'disabled') e.disabled = true;        // булев атрибут — через свойство
    else if (k === 'draggable') e.setAttribute('draggable', v === true ? 'true' : String(v));
    else e.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}

/* ---------- Группировка вопросов ---------- */
function getSections() {
  const map = new Map();
  for (const q of QUESTIONS) {
    if (!map.has(q.section)) {
      map.set(q.section, {
        number: q.section,
        title: q.section_title,
        topics: new Map(),
        count: 0,
      });
    }
    const sec = map.get(q.section);
    sec.count++;
    const topicKey = q.topic || '_';
    if (!sec.topics.has(topicKey)) {
      sec.topics.set(topicKey, {
        number: q.topic,
        title: q.topic_title || 'Без темы',
        questions: [],
      });
    }
    sec.topics.get(topicKey).questions.push(q);
  }
  return Array.from(map.values()).sort((a, b) => a.number - b.number);
}

function topicStats(questions, scope = 'section') {
  let correct = 0, wrong = 0, untouched = 0;
  for (const q of questions) {
    const a = Store.getAnswer(q.id, scope);
    if (!a) untouched++;
    else if (a.status === 'correct') correct++;
    else wrong++;
  }
  return { correct, wrong, untouched, total: questions.length, answered: correct + wrong };
}

/* ---------- Проверка ответа ---------- */
function checkAnswer(q, given) {
  if (q.type === 'sequence') {
    const correctOrder = q.sequence.map(s => s.text);
    return arraysEqual(given, correctOrder) ? 'correct' : 'wrong';
  }
  if (q.type === 'multi' || q.type === 'multiple') {
    const correctSet = new Set(q.options.filter(o => o.correct).map(o => o.text));
    const givenSet = new Set(given);
    return setsEqual(correctSet, givenSet) ? 'correct' : 'wrong';
  }
  // single / calc — индекс правильного
  const correctIndex = q.options.findIndex(o => o.correct);
  return given === correctIndex ? 'correct' : 'wrong';
}

          haptic.success();
          App.renderHome();
        },
      }, `🗑 Очистить (${errorIds.length})`),
    ));
  },

  renderSearch() {
    this.topMeta.textContent = 'Поиск';
    this.root.innerHTML = '';
    this.root.appendChild(el('button', { class: 'btn-ghost', onclick: () => App.goHome() }, '← К меню'));

    this.root.appendChild(el('h2', { style: 'margin:8px 0 4px;' }, '🔍 Поиск вопроса'));
    this.root.appendChild(el('div', { class: 'muted small', style: 'margin-bottom:12px;' },
      'Начните вводить текст вопроса — список будет обновляться в реальном времени.'
    ));

    // Поле ввода с обвязкой против "залипающей" клавиатуры iOS.
    // Контейнер делает поле и кнопку "✕" одним блоком.
    const inputWrap = el('div', { style: 'position:relative;width:100%;' });
    const input = el('input', {
      type: 'search',                 // на iOS даёт кнопку "Search" + крестик очистки
      inputmode: 'search',
      enterkeyhint: 'search',
      placeholder: 'Например: денежный поток, ERP, NPV…',
      style: 'width:100%;padding:12px 80px 12px 14px;font-size:16px;border-radius:10px;'
           + 'border:1px solid var(--border);background:var(--bg);color:var(--fg);'
           + 'box-sizing:border-box;outline:none;-webkit-appearance:none;appearance:none;',
      autocomplete: 'off',
      autocorrect: 'off',
      autocapitalize: 'off',
      spellcheck: 'false',
      // НЕ autofocus — на iOS это сразу открывает клавиатуру при заходе на экран,
      // что многих раздражает. Юзер сам тапнет, когда захочет.
    });
    // Кнопка "Готово" — снимает фокус с поля. На iOS это закрывает клавиатуру.
    const doneBtn = el('button', {
      type: 'button',
      style: 'position:absolute;right:6px;top:50%;transform:translateY(-50%);'
           + 'background:var(--accent);color:#fff;border:none;border-radius:6px;'
           + 'padding:6px 12px;font-size:13px;cursor:pointer;display:none;',
      onclick: () => {
        input.blur();
        // На iOS дополнительно прокрутим страницу, чтобы вернуть viewport
        window.scrollTo({ top: 0, behavior: 'smooth' });
      },
    }, 'Готово');
    // Показываем "Готово" только когда поле активно
    input.addEventListener('focus', () => { doneBtn.style.display = 'block'; });
    input.addEventListener('blur',  () => { setTimeout(() => doneBtn.style.display = 'none', 100); });
    // Enter тоже закрывает клавиатуру
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    });
    inputWrap.appendChild(input);
    inputWrap.appendChild(doneBtn);
    this.root.appendChild(inputWrap);

    // По скроллу списка — снимаем фокус, чтобы клавиатура не закрывала результаты
    // (это типичный паттерн iOS-приложений).
    let scrollBlurTimer = null;
    window.addEventListener('scroll', () => {
      if (document.activeElement === input) {
        clearTimeout(scrollBlurTimer);
        scrollBlurTimer = setTimeout(() => input.blur(), 50);
      }
    }, { passive: true });

    const status = el('div', { class: 'muted small', style: 'margin:10px 0 4px;' }, '');
    this.root.appendChild(status);

    const list = el('div', { class: 'topic-list', style: 'margin-top:8px;' });
    this.root.appendChild(list);

    // Нормализация для поиска: lowercase + убираем пунктуацию
    const normalize = s => (s || '')
      .toLowerCase()
      .replace(/[ё]/g, 'е')
      .replace(/[*«»"\'()\[\],:;–—\-?!.]/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();

    // Предкомпилируем индекс по ПОЛНОМУ набору (включая search_only и формулы).
    // Для формул в ключ поиска добавляем и саму формулу, и описание — чтобы
    // запрос вида "NPV", "BEP" находил справочную карточку.
    const index = QUESTIONS_ALL.map(q => {
      let key = normalize(q.text || '');
      if (q.formula)     key += ' ' + normalize(q.formula);
      if (q.description) key += ' ' + normalize(q.description);
      return { q, key };
    });

    const renderResults = (matches) => {
      list.innerHTML = '';
      if (!matches.length) return;
      const MAX_SHOW = 50;
      matches.slice(0, MAX_SHOW).forEach(({ q }) => {
        const card = el('div', { class: 'question-card', style: 'margin-bottom:10px;padding:12px 14px;' });

        // === Формула: специальная карточка ===
        if (q.type === 'formula') {
          card.appendChild(el('div', { class: 'muted small', style: 'margin-bottom:6px;' },
            '📐 Формула · ' + (q.section_title || '')));
          // Название формулы (то, что хранится в text)
          card.appendChild(el('div', { style: 'font-weight:600;margin-bottom:8px;line-height:1.4;' },
            (q.text || '').replace(/^Формула:\s*/, '')));
          // Сама формула — моноширинно, в блоке
          if (q.formula) {
            card.appendChild(el('div', {
              style: 'background:var(--correct-bg);padding:10px 12px;border-radius:8px;'
                   + 'font-family:ui-monospace,Menlo,Consolas,monospace;font-size:14px;'
                   + 'color:var(--correct);font-weight:600;white-space:pre-wrap;word-break:break-word;'
            }, q.formula));
          }
          // Пояснение
          if (q.description) {
            card.appendChild(el('div', {
              class: 'muted small',
              style: 'margin-top:8px;line-height:1.4;'
            }, q.description));
          }
          list.appendChild(card);
          return;
        }

        // === Обычный вопрос ===
        // Метка раздела
        card.appendChild(el('div', { class: 'muted small', style: 'margin-bottom:6px;' },
          q.section_title || (q.section != null ? `Раздел ${q.section}` : '')
        ));
        // Текст вопроса
        card.appendChild(el('div', { style: 'font-weight:500;margin-bottom:8px;line-height:1.4;' }, q.text));

        // Картинка (если есть)
        if (q.image) {
          card.appendChild(el('img', {
            class: 'question-image',
            src: imageUrl(q.image),
            alt: '',
            loading: 'lazy',
            style: 'max-width:100%;margin-bottom:8px;',
          }));
        }

        // Правильные ответы
        if (q.type === 'sequence' && Array.isArray(q.sequence)) {
          const seqBlock = el('div', { style: 'background:var(--correct-bg);padding:8px 10px;border-radius:8px;' });
          seqBlock.appendChild(el('div', { style: 'font-weight:600;color:var(--correct);margin-bottom:4px;font-size:13px;' },
            '✓ Правильная последовательность:'));
          q.sequence.forEach((s, i) => {
            seqBlock.appendChild(el('div', { style: 'font-size:13px;line-height:1.4;' },
              `${i + 1}. ${s.text}`));
          });
          card.appendChild(seqBlock);
        } else {
          const corrects = (q.options || []).filter(o => o.correct);
          if (corrects.length) {
            const ansBlock = el('div', { style: 'background:var(--correct-bg);padding:8px 10px;border-radius:8px;' });
            ansBlock.appendChild(el('div', { style: 'font-weight:600;color:var(--correct);margin-bottom:4px;font-size:13px;' },
              corrects.length > 1 ? '✓ Правильные ответы:' : '✓ Правильный ответ:'));
            corrects.forEach(o => {
              ansBlock.appendChild(el('div', { style: 'font-size:13px;line-height:1.4;' }, `• ${o.text}`));
            });
            card.appendChild(ansBlock);
          }
        }

        // Решение (для расчётных)
        if (q.solution) {
          card.appendChild(el('div', { class: 'solution-block', style: 'margin-top:8px;' },
            el('strong', {}, '💡 Решение: '), q.solution));
        }

        list.appendChild(card);
      });
      if (matches.length > MAX_SHOW) {
        list.appendChild(el('div', { class: 'muted small', style: 'text-align:center;padding:10px;' },
          `Показано ${MAX_SHOW} из ${matches.length} результатов. Уточните запрос, чтобы увидеть нужный.`));
      }
    };

    const runSearch = () => {
      const raw = input.value.trim();
      if (!raw) {
        status.textContent = `Введите текст для поиска (всего ${QUESTIONS_ALL.length} записей в базе, включая формулы)`;
        list.innerHTML = '';
        return;
      }
      const needle = normalize(raw);
      if (needle.length < 2) {
        status.textContent = 'Введите хотя бы 2 символа…';
        list.innerHTML = '';
        return;
      }
      // Разбиваем запрос на слова — все должны встретиться в тексте/формуле.
      const words = needle.split(' ').filter(Boolean);
      const matches = index.filter(({ key }) => words.every(w => key.includes(w))).map(x => x);
      status.textContent = matches.length
        ? `Найдено: ${matches.length}`
        : 'Ничего не найдено. Попробуйте другие слова.';
      renderResults(matches);
    };

    // Live-поиск
    input.addEventListener('input', runSearch);
    runSearch();  // первый вызов покажет статус
  },

  renderExamHistory() {
    this.topMeta.textContent = 'История экзаменов';
    this.root.innerHTML = '';
    this.root.appendChild(el('button', { class: 'btn-ghost', onclick: () => App.goHome() }, '← К меню'));

    const items = ExamHistory.all();

    // Шапка с кнопкой очистки
    const headerRow = el('div', { class: 'row between', style: 'margin:16px 0 8px;' },
      el('h2', { style: 'margin:0;' }, `Решённые экзамены: ${items.length}`),
      items.length > 0
        ? el('button', { class: 'btn-ghost', style: 'color:var(--wrong);',
            onclick: () => {
              if (!confirm('Очистить всю историю экзаменов? Основной прогресс (ответы по вопросам) останется.')) return;
              clearExamHistoryWithApi();
              App.renderExamHistory();
            }
          }, '🗑 Очистить историю')
        : null
    );
    this.root.appendChild(headerRow);

    if (items.length === 0) {
      this.root.appendChild(el('div', { class: 'question-card', style: 'margin-top:8px;' },
        el('div', { class: 'muted' }, 'Здесь будут появляться ваши решённые экзамены. Завершите экзамен — и попытка попадёт сюда.')
      ));
      return;
    }

    const fmtDate = ts => {
      const d = new Date(ts);
      const pad = n => String(n).padStart(2, '0');
      return `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    };
    const fmtDuration = ms => {
      const total = Math.max(0, Math.floor(ms / 1000));
      const m = Math.floor(total / 60);
      const s = total % 60;
      return `${m} мин ${s} с`;
    };

    const list = el('div', { class: 'topic-list' });
    items.forEach((attempt) => {
      const total   = attempt.total || 0;
      const correct = attempt.correct || 0;
      const pct     = total ? Math.round(correct / total * 100) : 0;
      let grade, gradeClass;
      if (pct >= 85) { grade = 'Отлично'; gradeClass = 'grade-otl'; }
      else if (pct >= 75) { grade = 'Хорошо'; gradeClass = 'grade-hor'; }
      else if (pct >= 60) { grade = 'Удовл.'; gradeClass = 'grade-udov'; }
      else { grade = 'Неудовл.'; gradeClass = 'grade-neud'; }

      const card = el('div', { class: 'question-card' });

      // Заголовок: дата + результат
      card.appendChild(el('div', { class: 'row between', style: 'margin-bottom:8px;' },
        el('div', { style: 'font-weight:600;' }, fmtDate(attempt.finished_at)),
        el('div', { class: gradeClass, style: 'font-weight:700;' }, `${correct} / ${total} · ${pct}% — ${grade}`)
      ));

      // Время
      card.appendChild(el('div', { class: 'muted small', style: 'margin-bottom:10px;' },
        `⏱ Время прохождения: ${fmtDuration(attempt.duration_ms || 0)}`
      ));

      // Разбивка по разделам (только те, в которых были ошибки или были вопросы вообще)
      const sections = (attempt.details && attempt.details.sections) || [];
      if (sections.length) {
        card.appendChild(el('div', { class: 'muted small', style: 'margin-bottom:6px;font-weight:600;' }, 'По разделам:'));
        const secList = el('div', { style: 'display:flex;flex-direction:column;gap:6px;' });
        sections.forEach(s => {
          const sTotal   = s.total || 0;
          const sCorrect = s.correct || 0;
          const sWrong   = s.wrong || 0;
          const sPct     = sTotal ? Math.round(sCorrect / sTotal * 100) : 0;
          const colorVar = sWrong === 0 ? 'var(--correct)' : (sPct >= 60 ? 'var(--warn)' : 'var(--wrong)');
          secList.appendChild(el('div', {
            style: 'display:flex;justify-content:space-between;font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;',
          },
            el('span', {}, `Раздел ${s.number}: ${s.title || ''}`.trim()),
            el('span', { style: `color:${colorVar};font-weight:600;white-space:nowrap;` },
              `${sCorrect}/${sTotal} (${sPct}%)`
            )
          ));
        });
        card.appendChild(secList);
      }

      // Кнопка просмотра ответов по вопросам (если попытка сохранила детали).
      const qs = (attempt.details && attempt.details.questions) || [];
      if (qs.length) {
        card.appendChild(el('button', {
          class: 'btn-ghost',
          style: 'width:100%;margin-top:10px;',
          onclick: () => App.renderExamAttemptReview(attempt),
        }, '🔍 Посмотреть ответы'));
      } else {
        card.appendChild(el('div', { class: 'muted small', style: 'margin-top:10px;font-style:italic;' },
          'Разбор по вопросам недоступен для этой попытки (сохранена до обновления).'));
      }

      list.appendChild(card);
    });
    this.root.appendChild(list);
  },

  // Разбор конкретной ПРОШЛОЙ попытки: вопросы подтягиваются из текущей базы
  // по id, пометки (верно/неверно/пропущен) — из сохранённых ответов попытки.
  renderExamAttemptReview(attempt) {
    this.topMeta.textContent = 'Разбор экзамена';
    this.root.innerHTML = '';
    this.root.appendChild(el('button', { class: 'btn-ghost', onclick: () => App.renderExamHistory() }, '← К истории'));

    const total   = attempt.total || 0;
    const correct = attempt.correct || 0;
    const pct     = total ? Math.round(correct / total * 100) : 0;
    const fmtDate = ts => {
      const d = new Date(ts); const pad = n => String(n).padStart(2, '0');
      return `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    };
    this.root.appendChild(el('div', { class: 'result-banner', style: 'margin-top:12px;' },
      el('div', { class: 'muted' }, fmtDate(attempt.finished_at)),
      el('div', { class: 'result-score' }, `${correct} / ${total}`),
      el('div', { class: 'result-grade' }, `${pct}%`),
    ));

    const qs = (attempt.details && attempt.details.questions) || [];
    // Считаем пропущенные/верные/неверные для краткой сводки
    let nSkip = 0, nCorr = 0, nWrong = 0;
    const results = qs.map(item => {
      const q = getQuestion(item.id);
      if (!item.answered) nSkip++; else if (item.status === 'correct') nCorr++; else nWrong++;
      return { q, given: item.given, status: item.status, answered: !!item.answered };
    });
    this.root.appendChild(el('div', { class: 'muted small', style: 'margin:10px 0 4px;' },
      `Отвечено верно: ${nCorr} · неверно: ${nWrong} · пропущено: ${nSkip}`));

    this.root.appendChild(el('h2', {}, 'Подробный разбор'));
    const list = el('div', { class: 'topic-list' });
    results.forEach((r, idx) => list.appendChild(Session._resultCard(r, idx)));
    this.root.appendChild(list);
  },

  renderPatchesList() {
    this.topMeta.textContent = 'Мои правки';
    this.root.innerHTML = '';
    this.root.appendChild(el('button', { class: 'btn-ghost', onclick: () => App.goHome() }, '← К меню'));

    const overrides = Store.getAllOverrides();
    const entries = Object.entries(overrides);
    if (entries.length === 0) {
      this.root.appendChild(el('div', { class: 'question-card', style: 'margin-top:16px;' },
        el('div', { class: 'muted' }, 'Правок пока нет.')));
      return;
    }
    // отсортируем по времени, новые сверху
    entries.sort((a, b) => (b[1].ts || 0) - (a[1].ts || 0));



    const list = el('div', { class: 'topic-list', style: 'margin-top:16px;' });
    for (const [qid, patch] of entries) {
      const q = getQuestion(Number(qid));
      if (!q) continue;
      const dt = patch.ts ? new Date(patch.ts).toLocaleString('ru-RU') : '';
      const fields = [];
      if (patch.text !== undefined) fields.push('текст');
      if (patch.options !== undefined) fields.push('варианты/ответы');
      if (patch.sequence !== undefined) fields.push('последовательность');
      if (patch.solution !== undefined) fields.push('решение');

      list.appendChild(el('div', { class: 'question-card' },
        el('div', { class: 'question-meta' },
          el('div', {},
            el('span', { class: 'edited-badge' }, `#${qid}`),
            el('span', { class: 'muted small', style: 'margin-left:8px;' },
              q.topic ? `${q.topic}. ${q.topic_title}` : (q.section_title || ''))
          ),
          el('span', { class: 'muted small' }, dt)
        ),
        el('div', { class: 'question-text', style: 'font-size:14px;' }, q.text),
        el('div', { class: 'muted small', style: 'margin-bottom:10px;' },
          'Изменено: ' + fields.join(', ')),
        el('div', { class: 'row' },
          el('button', { onclick: () => Editor.open(Number(qid)) }, '✏️ Открыть в редакторе'),
          el('button', { class: 'btn-danger', onclick: () => {
            if (confirm('Откатить правку и вернуть оригинал?')) {
              Store.removeOverride(Number(qid));
              App.renderPatchesList();
            }
          }}, '↺ Откатить'),
        )
      ));
    }
    this.root.appendChild(list);
  },
};

function renderProgressNum(stats) {
  const span = document.createElement('span');
  const pct = stats.total ? Math.round(stats.correct / stats.total * 100) : 0;
  span.innerHTML = `<span class="pct">${stats.correct}/${stats.total}</span> · ${pct}%`;
  return span;
}

/* Карточка «разбор вопроса»: текст, картинка, варианты (правильный подсвечен,
 * выбор пользователя помечен, если известен), решение. Используется в общей
 * статистике при клике на вопрос.
 *   given          — сохранённый ответ пользователя (индекс / массив текстов /
 *                    порядок), либо undefined если конкретный выбор не сохранён
 *                    (например, вопрос закрыт в экзамене или в работе над ошибками).
 *   overallStatus  — 'correct' | 'wrong' | 'none' — итоговый статус вопроса.
 */
function renderQuestionReviewCard(q, given, overallStatus) {
  const card = el('div', { class: 'question-card', style: 'text-align:left;' });
  card.appendChild(el('div', { class: 'question-meta' },
    el('span', { class: 'muted small', title: `id ${q.id}` },
        q.section_title || (q.section != null ? `Раздел ${q.section}` : '')),
  ));
  if (q.image) {
    card.appendChild(el('img', {
      class: 'question-image', src: imageUrl(q.image), alt: '', loading: 'lazy',
      style: 'max-width:100%;margin-bottom:8px;'
    }));
  }
  card.appendChild(el('div', { class: 'question-text', style: 'font-size:14px;' }, q.text));

  const hasGiven = given !== undefined && given !== null;

  if (q.type === 'sequence') {
    card.appendChild(el('div', { class: 'muted small', style: 'margin:8px 0 4px;' }, 'Правильный порядок:'));
    card.appendChild(el('ol', { style: 'margin:0;padding-left:22px;' },
      ...q.sequence.map(s => el('li', {}, s.text))));
    if (hasGiven && Array.isArray(given)) {
      card.appendChild(el('div', { class: 'muted small', style: 'margin:8px 0 4px;' }, 'Ваш порядок:'));
      card.appendChild(el('ol', { style: 'margin:0;padding-left:22px;' },
        ...given.map(t => el('li', {}, t))));
    }
  } else if (Array.isArray(q.options)) {
    const opts = el('div', { class: 'options' });
    q.options.forEach((o, oi) => {
      const classes = ['option'];
      let userPicked = false;
      if (Array.isArray(given)) userPicked = given.includes(o.text);
      else if (typeof given === 'number') userPicked = (given === oi);
      if (o.correct) classes.push('reveal-correct');
      if (userPicked && !o.correct) classes.push('wrong');
      opts.appendChild(el('div', { class: classes.join(' ') },
        el('div', { class: 'option-marker' + ((q.type === 'multi' || q.type === 'multiple') ? ' square' : '') }),
        el('div', { class: 'option-text' }, o.text)
      ));
    });
    card.appendChild(opts);
  }

  if (!hasGiven) {
    let note;
    if (overallStatus === 'correct') note = 'Отвечено верно (в экзамене или в работе над ошибками). Конкретный выбор не сохранён — выше отмечен правильный вариант.';
    else if (overallStatus === 'wrong') note = 'Отвечено неверно. Конкретный выбор не сохранён — выше отмечен правильный вариант.';
    else note = 'Вы ещё не отвечали на этот вопрос. Выше отмечен правильный вариант.';
    card.appendChild(el('div', { class: 'muted small', style: 'margin-top:8px;' }, note));
  }

  if (q.solution) {
    card.appendChild(el('div', { class: 'solution-block' }, el('strong', {}, '💡 '), q.solution));
  }
  return card;
}
